<script>
    console.log("=== DOODLE NOTEBOOK SCANNER 5.13 LOADED ===");

    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let status = document.getElementById('status');
    let debugInfo = document.getElementById('debug-info');

    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let cellCanvases = [];

    let arucoReady = false;   // ← NEW FLAG

    function log(text) {
      const logEl = document.getElementById('console-log');
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    // === ML Model ===
    async function loadModel() {
      log("Loading ML model...");
      try {
        model = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        classNames = meta.labels || meta.classNames || [];
        log(`✅ Model loaded! ${classNames.length} classes`);
      } catch (e) {
        log("❌ ERROR loading model: " + e.message);
      }
    }

    // === Camera ===
    async function startCamera() {
      log("Starting camera...");
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadeddata = () => {
          document.getElementById('snap-btn').style.display = 'block';
          log("✅ Camera preview loaded!");
        };
      } catch (e) {
        log("❌ Camera access error: " + e.message);
      }
    }

    // === SNAP BUTTON ===
    document.getElementById('snap-btn').onclick = () => {
      if (!arucoReady) {
        log("⏳ ArUco library still loading — try again in 1 second");
        status.textContent = "Library still loading... tap SNAP again in 1s";
        return;
      }

      status.textContent = "Capturing photo...";
      const ctx = outputCanvas.getContext('2d');
      outputCanvas.width = video.videoWidth;
      outputCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      status.textContent = "Detecting markers...";
      setTimeout(() => processWithArUco(outputCanvas), 100);
    };

    // === PURE JS ARUCO DETECTION ===
    async function processWithArUco(canvas) {
      try {
        log("🚀 Starting pure JS ArUco2 detection...");

        const detector = new AR.Detector();
        const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        const markers = detector.detect(imageData);

        log(`Found ${markers.length} markers`);

        let markerMap = {};
        for (let m of markers) {
          if (m.id >= 0 && m.id <= 3) {
            markerMap[m.id] = m.corners;
          }
        }

        if (Object.keys(markerMap).length === 4) {
          log("✅ Found all 4 markers! Warping now...");
          status.textContent = "✅ Markers found — warping grid...";

          // TODO: Add your full warping + grid code here (orderPoints, perspectiveTransform, etc.)
          // For now we just confirm detection works

        } else {
          log(`❌ Only ${Object.keys(markerMap).length} markers found — need all 4`);
          status.textContent = "Markers not detected - make sure all 4 corners are visible";
        }

      } catch (e) {
        log('❌ ArUco error: ' + e.message);
        status.textContent = "Error during marker detection";
      }
    }

    // === ON LOAD ===
    window.onload = async () => {
      log("Loading page...");
      await loadModel();
      startCamera();
    };
  </script>
