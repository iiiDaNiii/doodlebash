<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doodle Notebook Scanner 5.13</title>

<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>

<!-- Pure JS ArUco -->
<script src="https://cdn.jsdelivr.net/npm/js-aruco2@1.0.0/dist/js-aruco2.min.js"></script>

<style>
body { margin:0; background:#000; color:white; font-family:system-ui; }
.container { height:100dvh; display:flex; flex-direction:column; }
.header { background:#7f2a8f; padding:12px; text-align:center; font-size:22px; }
.content { flex:1; display:flex; flex-direction:column; align-items:center; gap:12px; padding:12px; }
.camera-container { position:relative; width:90vw; max-width:520px; aspect-ratio: 3/2; overflow:hidden; border-radius:12px; }
video { width:100%; height:100%; object-fit:cover; }
canvas { max-width:90vw; border:3px solid #333; background:#fff; }
.console-log { width:90vw; max-width:520px; background:#111; color:#0f0; padding:10px; font-family:monospace; font-size:13px; max-height:200px; overflow-y:auto; }
button { padding:12px 24px; font-size:18px; }
</style>
</head>

<body>
<div class="container">
  <div class="header">Doodle Notebook Scanner 5.13</div>
  <div class="content">
    <div class="camera-container">
      <video id="camera" autoplay playsinline muted></video>
    </div>
    <button id="snap">SNAP</button>
    <canvas id="canvas"></canvas>
    <div id="console" class="console-log">Ready…</div>
  </div>
</div>

<script>
const video = document.getElementById("camera");
const canvas = document.getElementById("canvas");
const ctx = canvas.getContext("2d");
const logEl = document.getElementById("console");

function log(msg) {
  logEl.textContent += msg + "\n";
  logEl.scrollTop = logEl.scrollHeight;
}

// --- START CAMERA ---
async function startCamera() {
  const stream = await navigator.mediaDevices.getUserMedia({
    video: { facingMode: "environment" }
  });
  video.srcObject = stream;
  await video.play();
  log("✅ Camera started");
}

// --- SNAP ---
document.getElementById("snap").onclick = () => {
  if (video.videoWidth === 0) {
    log("⚠️ Video not ready");
    return;
  }

  canvas.width = video.videoWidth;
  canvas.height = video.videoHeight;
  ctx.drawImage(video, 0, 0);

  requestAnimationFrame(() => detectAruco());
};

// --- DETECT ---
function detectAruco() {
  log("🔍 Detecting ArUco markers...");

  const DetectorClass =
    window.AR?.Detector ||
    window.aruco?.Detector;

  if (!DetectorClass) {
    log("❌ ArUco detector not found");
    return;
  }

  const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);

  // Convert to grayscale (important!)
  for (let i = 0; i < imageData.data.length; i += 4) {
    const g =
      imageData.data[i] * 0.299 +
      imageData.data[i + 1] * 0.587 +
      imageData.data[i + 2] * 0.114;
    imageData.data[i] =
    imageData.data[i + 1] =
    imageData.data[i + 2] = g;
  }

  const detector = new DetectorClass();
  const markers = detector.detect(imageData);

  log(`📌 Found ${markers.length} marker(s)`);

  markers.forEach(m => {
    log(`➡️ ID ${m.id} | corners: ${JSON.stringify(m.corners)}`);

    // draw outline
    ctx.strokeStyle = "red";
    ctx.lineWidth = 4;
    ctx.beginPath();
    m.corners.forEach((c, i) => {
      if (i === 0) ctx.moveTo(c.x, c.y);
      else ctx.lineTo(c.x, c.y);
    });
    ctx.closePath();
    ctx.stroke();

    ctx.fillStyle = "red";
    ctx.font = "30px system-ui";
    ctx.fillText(m.id, m.corners[0].x, m.corners[0].y - 10);
  });

  const found = markers.filter(m => m.id >= 0 && m.id <= 3).length;
  if (found === 4) {
    log("✅ All 4 corner markers detected!");
  } else {
    log(`❌ Need 4 markers (found ${found})`);
  }
}

// --- INIT ---
window.onload = startCamera;
</script>
</body>
</html>
