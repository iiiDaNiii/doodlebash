<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Notebook Scanner 6.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; }
    .container { height:100dvh; display:flex; flex-direction:column; }
    .header { background:#7f2a8f; padding:3cqi; text-align:center; font-size:6cqi; }
    .content { flex:1; display:flex; flex-direction:column; align-items:center; padding:4cqi; gap:3cqi; }
    .camera-container {
      position:relative;
      width:90vw;
      max-width:520px;
      aspect-ratio: 3 / 2;
      border-radius:16px;
      overflow:hidden;
      background:#111;
    }
    #camera-preview { width:100%; height:100%; object-fit:cover; }
    #grid-overlay {
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
    }
    #output-canvas { max-width:90vw; border:3px solid #333; border-radius:12px; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    .status { font-size:4.5cqi; text-align:center; margin:10px 0; }
    .debug { font-size:3.2cqi; color:#aaa; text-align:left; max-width:520px; padding:2cqi; background:rgba(255,255,255,0.05); border-radius:8px; }
    
    .debug-cells { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; width:90vw; max-width:520px; }
    .debug-cell { border:2px solid #666; border-radius:8px; overflow:hidden; aspect-ratio:1/1; }
    .debug-cell canvas { width:100%; height:100%; display:block; }
    
    .console-log {
      width:90vw; max-width:520px;
      background:#222; color:#0f0;
      padding:12px; font-family:monospace; font-size:3.2cqi;
      line-height:1.5; border-radius:8px;
      white-space:pre-wrap; max-height:180px; overflow-y:auto;
    }
    #tweak-prompt {
      display:none; text-align:center; font-size:4cqi; color:#ff0;
      background:rgba(0,0,0,0.6); padding:2cqi; border-radius:8px;
      width:90vw; max-width:520px;
    }
    #detected-grid {
      display:none; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(7,1fr);
      gap:3px; width:90vw; max-width:520px; height:420px;
      background:#111; padding:8px; border-radius:12px;
    }
    .grid-cell {
      aspect-ratio:1; background:#f0f0f0; border:3px solid #ccc;
      border-radius:8px; background-size:contain; background-position:center;
      background-repeat:no-repeat; cursor:pointer; transition:transform .2s;
    }
    .grid-cell:hover { transform:scale(1.12); }
    #export-btn { background:#4dbde5; color:white; padding:3cqi 10cqi; font-size:5cqi; border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; display:none; }
    
    #doodle-popup {
      display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.8); padding:4cqi; border-radius:16px; z-index:100;
      box-shadow:0 0 20px rgba(255,255,255,0.2);
    }
    .popup-grid {
      display:grid; grid-template-columns:repeat(7,1fr); gap:1.5cqi;
      max-width:90vw; max-height:80vh; overflow-y:auto;
    }
    .popup-item {
      width:8cqi; height:8cqi;
      background:#f0f0f0; border:2px solid #ccc; border-radius:8px;
      background-size:contain; background-position:center; background-repeat:no-repeat;
      cursor:pointer;
    }
    .popup-item:hover { border-color:#ff0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Doodle Notebook Scanner 6.0</div>
    <div class="content">
      <p>Line up your notebook so the <strong>red grid</strong> perfectly matches the printed grid.<br>Fill the frame edge-to-edge then tap SNAP.</p>
      
      <div class="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
        <canvas id="grid-overlay"></canvas>
      </div>
      
      <button id="snap-btn" style="display:none; padding:3cqi 8cqi; font-size:5.5cqi;">SNAP NOW</button>
      <canvas id="output-canvas"></canvas>
      <div id="status" class="status">Align grid then SNAP</div>
      <div class="debug" id="debug-info">Manual grid mode • 11×7 overlay • No auto-warp</div>
      
      <div id="debug-cells" class="debug-cells"></div>
      <div id="console-log" class="console-log">Waiting for photo...</div>
      <div id="tweak-prompt">Detected! Tap any wrong cell to correct</div>
      <div id="detected-grid"></div>
      <button id="export-btn">📤 EXPORT TRAINING ZIP</button>
    </div>
  </div>

  <div id="doodle-popup">
    <div class="popup-grid" id="popup-grid"></div>
  </div>

  <script>
    console.log("=== DOODLE NOTEBOOK SCANNER 6.0 - GRID ALIGN MODE ===");

    // Shared state
    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let status = document.getElementById('status');
    let debugInfo = document.getElementById('debug-info');

    // ML
    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let cellCanvases = [];

    function log(text) {
      const logEl = document.getElementById('console-log');
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function loadModel() {
      log("Loading ML model...");
      try {
        model = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        classNames = meta.labels || meta.classNames || [];
        log(`✅ Model loaded! ${classNames.length} classes`);
      } catch (e) {
        log("❌ ERROR loading model: " + e.message);
      }
    }

    function drawGridLines(ctx, w, h) {
      ctx.lineCap = 'round';
      // Vertical lines (11 columns → 12 lines)
      for (let i = 0; i <= 11; i++) {
        const x = Math.round(i * w / 11);
        ctx.beginPath();
        ctx.moveTo(x, 0);
        ctx.lineTo(x, h);
        
        if (i === 5) {
          ctx.strokeStyle = 'rgba(255,255,0,0.85)'; // yellow divider
          ctx.lineWidth = Math.max(4.5, w / 180);
        } else {
          ctx.strokeStyle = 'rgba(255,50,50,0.92)';
          ctx.lineWidth = Math.max(2.2, w / 400);
        }
        ctx.stroke();
      }
      // Horizontal lines (7 rows → 8 lines)
      ctx.strokeStyle = 'rgba(255,50,50,0.92)';
      ctx.lineWidth = Math.max(2.2, w / 400);
      for (let i = 0; i <= 7; i++) {
        const y = Math.round(i * h / 7);
        ctx.beginPath();
        ctx.moveTo(0, y);
        ctx.lineTo(w, y);
        ctx.stroke();
      }
    }

    function initGridOverlay() {
      const overlay = document.getElementById('grid-overlay');
      
      function redraw() {
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        const ctx = overlay.getContext('2d');
        drawGridLines(ctx, overlay.width, overlay.height);
      }
      
      redraw();
      window.addEventListener('resize', redraw);
    }

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({ 
        video: { facingMode: 'environment' } 
      });
      video.srcObject = stream;
      video.onloadeddata = () => {
        document.getElementById('snap-btn').style.display = 'block';
        initGridOverlay();
      };
    }

    // ========== NEW SNAP & DETECTION (raw capture + grid split) ==========
    document.getElementById('snap-btn').onclick = async () => {
      status.textContent = "Capturing raw photo...";
      const captured = document.createElement('canvas');
      captured.width = video.videoWidth;
      captured.height = video.videoHeight;
      captured.getContext('2d').drawImage(video, 0, 0);

      // Show captured image + grid on output canvas for confirmation
      outputCanvas.width = captured.width;
      outputCanvas.height = captured.height;
      const outCtx = outputCanvas.getContext('2d');
      outCtx.drawImage(captured, 0, 0);
      drawGridLines(outCtx, outputCanvas.width, outputCanvas.height);

      status.textContent = "Splitting into 70 cells & classifying...";
      await detectFromRawCapture(captured);
    };

    async function detectFromRawCapture(captured) {
      const numCols = 11;
      const numRows = 7;
      const cellW = captured.width / numCols;
      const cellH = captured.height / numRows;
      const playableCols = [0,1,2,3,4,6,7,8,9,10];

      detectedDoodles = [];
      cellCanvases = [];
      log("🚀 Detecting 70 doodles (raw grid split)...");

      for (let r = 0; r < numRows; r++) {
        for (let c of playableCols) {
          const cellCanvas = document.createElement('canvas');
          cellCanvas.width = 224;
          cellCanvas.height = 224;
          const cellCtx = cellCanvas.getContext('2d');

          cellCtx.drawImage(
            captured,
            Math.round(c * cellW),
            Math.round(r * cellH),
            Math.round(cellW),
            Math.round(cellH),
            0, 0, 224, 224
          );

          cellCanvases.push(cellCanvas);

          const tensor = tf.browser.fromPixels(cellCanvas).expandDims(0).toFloat().div(255);
          const prediction = model.predict(tensor);
          const scores = await prediction.array();

          let maxIndex = scores[0].indexOf(Math.max(...scores[0]));
          let predicted = classNames[maxIndex];
          if (predicted === 'unknown' && scores[0].length > 1) {
            scores[0][maxIndex] = -999;
            maxIndex = scores[0].indexOf(Math.max(...scores[0]));
            predicted = classNames[maxIndex];
          }

          log(`Cell [${r},${c}] → ${predicted}`);
          detectedDoodles.push(predicted);
        }
      }

      renderDetectedGrid();
      renderDebugCells(captured);
      document.getElementById('tweak-prompt').style.display = 'block';
      document.getElementById('console-log').scrollTop = 999999;
      status.textContent = `✅ Scanned ${detectedDoodles.length} cells!`;
    }

    function renderDebugCells(captured) {
      const container = document.getElementById('debug-cells');
      container.innerHTML = '';
      const playableCols = [0,1,2,3,4,6,7,8,9,10];
      const cellW = captured.width / 11;
      const cellH = captured.height / 7;

      for (let r = 0; r < 7; r++) {
        for (let c of playableCols) {
          const thumb = document.createElement('canvas');
          thumb.width = 80;
          thumb.height = 80;
          const tctx = thumb.getContext('2d');
          tctx.drawImage(
            captured,
            Math.round(c * cellW), Math.round(r * cellH),
            Math.round(cellW), Math.round(cellH),
            0, 0, 80, 80
          );
          const div = document.createElement('div');
          div.className = 'debug-cell';
          div.appendChild(thumb);
          container.appendChild(div);
        }
      }
    }

    // (All the old UI functions below are unchanged — showDoodlePopup, renderDetectedGrid, exportTrainingData, etc.)
    let currentCellIndex = -1;
    function showDoodlePopup(index) {
      currentCellIndex = index;
      const popup = document.getElementById('doodle-popup');
      const grid = document.getElementById('popup-grid');
      grid.innerHTML = '';
     
      const opts = classNames.filter(name => name !== 'unknown');
      opts.forEach(d => {
        const item = document.createElement('div');
        item.className = 'popup-item';
        item.style.backgroundImage = `url('images/${d}.png')`;
        item.onclick = () => {
          const cell = document.querySelector(`.grid-cell[data-index="${index}"]`);
          cell.dataset.doodle = d;
          cell.className = `grid-cell ${d}`;
          cell.style.backgroundImage = `url('images/${d}.png')`;
          detectedDoodles[index] = d;
          popup.style.display = 'none';
        };
        grid.appendChild(item);
      });
      popup.style.display = 'block';
    }

    function renderDetectedGrid() {
      const grid = document.getElementById('detected-grid');
      grid.innerHTML = '';
      grid.style.display = 'grid';
    
      detectedDoodles.forEach((d, i) => {
        const cell = document.createElement('div');
        cell.className = `grid-cell ${d}`;
        cell.dataset.index = i;
        cell.dataset.doodle = d;
        cell.style.backgroundImage = `url('images/${d}.png')`;
        cell.addEventListener('click', () => showDoodlePopup(i));
        grid.appendChild(cell);
      });
      document.getElementById('export-btn').style.display = 'block';
    }

    async function exportTrainingData() {
      const zip = new JSZip();
      log("📦 Building training ZIP...");
     
      detectedDoodles.forEach((doodle, i) => {
        const className = doodle.toLowerCase().replace(/[^a-z0-9]/g, '');
        const randomNum = Math.floor(Math.random() * 900000) + 100000;
        const filename = `${className}${randomNum}.png`;
       
        const cellCanvas = cellCanvases[i];
        cellCanvas.toBlob(blob => {
          zip.file(filename, blob);
        }, 'image/png');
      });
     
      setTimeout(async () => {
        const content = await zip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `doodle-training-${new Date().toISOString().slice(0,10)}.zip`;
        a.click();
        URL.revokeObjectURL(url);
        log(`✅ Exported ${detectedDoodles.length} images!`);
      }, 500);
    }

    document.getElementById('export-btn').onclick = exportTrainingData;

    window.onload = async () => {
      await loadModel();
      startCamera();
    };
  </script>
</body>
</html>
