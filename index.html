<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Bash</title>
  <link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    #game-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 56.25dvh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr 3fr 1fr;
      overflow: hidden;
      container-type: inline-size;
    }
    @media (max-aspect-ratio: 9/16) {
      #game-container {
        width: 100vw;
        height: calc(100vw * 16 / 9);
      }
    }
    #header, #footer {
      container-type: inline-size;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      gap: 4cqi;
    }
    #shuffle-zone {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 1fr);
      height: 100%;
      width: 100%;
      container-type: inline-size;
      overflow: hidden;
    }
    #doodle-l1 { grid-column:1; grid-row:2; }
    #doodle-l2 { grid-column:1; grid-row:3; }
    #doodle-l3 { grid-column:1; grid-row:4; }
    #doodle-r1 { grid-column:3; grid-row:2; }
    #doodle-r2 { grid-column:3; grid-row:3; }
    #doodle-r3 { grid-column:3; grid-row:4; }
    #doodle-l1, #doodle-l2, #doodle-l3,
    #doodle-r1, #doodle-r2, #doodle-r3 {
      background-size: auto 75%;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 20;
      transition: transform 0.35s ease-out;
      transform: translateY(100dvh) rotate(0deg);
      cursor: pointer;
    }
    button {
      border: none;
      font-family: 'Covered By Your Grace', cursive;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s;
    }
    button:hover { transform: scale(1.05); }
    #header button, #footer button {
      font-size: 6.5cqi;
      padding: 3cqi 9cqi;
      border-radius: 9999px;
    }
    #header button { background: #7f2a8f; color: white; }
    #footer button { background: #fbb065; color: #000; }
    #footer #score-btn { background: #5fbae9; color: #000; }
    #shuffle-btn {
      grid-column: 2;
      grid-row: 3;
      background: #4dbde5;
      color: white;
      font-size: 6.5cqi;
      width: 100%;
      border-radius: 9999px;
    }
    /* MODALS */
    .modal {
      position: absolute;
      inset: 0;
      background: #fff;
      display: none;
      flex-direction: column;
      z-index: 100;
      container-type: inline-size;
      transform: translateY(0);
      transition: transform 0.4s ease-out;
    }
    .modal.learn { transform: translateY(-100%); }
    .modal.portfolio { transform: translateY(100%); }
    .modal.guide { transform: translateX(-100%); }
    .modal.score { background: #0a0a0a; }
    .modal.active {
      display: flex;
      transform: translate(0);
    }
    .modal-top {
      flex: 0 0 18%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4cqi;
      color: white;
    }
    .modal-top.learn { background: #7f2a8f; }
    .modal-top.portfolio { background: #fbb065; color: #000; }
    .modal-top.guide { background: #4dbde5; }
    .modal-top.score { background: #5fbae9; color: #000; }
    .modal-top .title {
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
    }
    .modal-top .buttons {
      display: flex;
      align-items: center;
      gap: 10.5cqi;
    }
    .close-btn,
    .action-btn {
      height: 9cqi;
      line-height: 9cqi;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7cqi;
    }
    .close-btn {
      width: 9cqi;
      border-radius: 2cqi;
      background: rgba(255,255,255,0.25);
      color: white;
    }
    .modal-top.portfolio .close-btn,
    .modal-top.guide .close-btn,
    .modal-top.score .close-btn {
      background: rgba(0,0,0,0.15);
      color: #000;
    }
    .action-btn {
      padding: 0 6cqi;
      font-size: 6cqi;
      min-width: 14cqi;
      border-radius: 9999px;
      display: none;
    }
    .action-btn.learn { background: #fbb065; color: #000000; }
    .action-btn.remove { background: #7f2a8f; color: white; }
    .modal-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 1.4cqi;
      padding: 1.8cqi;
      overflow: hidden;
    }
    .modal-bottom-spacer {
      flex: 0 0 2.25%;
      background: transparent;
    }
    .doodle-cell {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1cqi;
      border-radius: 18px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }
    .doodle-cell:hover:not(.selected) {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }
    .doodle-cell.selected {
      transform: scale(1.5);
      z-index: 10;
      opacity: 1 !important;
    }
    .modal-grid .doodle-cell:not(.selected) {
      opacity: 0.5;
    }
    .modal-grid:not(:has(.selected)) .doodle-cell {
      opacity: 1;
    }
    .doodle-img {
      width: 92%;
      aspect-ratio: 1 / 1;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 14px;
      transition: all 0.6s ease-out;
    }
    .doodle-cell.animate-learn .doodle-img {
      animation: learnSpinShrink 0.6s ease-in-out forwards;
    }
    @keyframes learnSpinShrink {
      0% { transform: scale(1) rotate(0deg); }
      40% { transform: scale(0.1) rotate(720deg); }
      100% { transform: scale(1) rotate(720deg); }
    }
    .doodle-cell.animate-remove {
      animation: removeSlideDown 0.6s ease-in-out forwards;
    }
    @keyframes removeSlideDown {
      0% { transform: translateY(0); }
      100% { transform: translateY(200%); }
    }
    .doodle-cell.animate-remove .doodle-img {
      animation: spinFadeScale 0.6s ease-in-out forwards;
    }
    @keyframes spinFadeScale {
      0% { transform: scale(1) rotate(0deg); opacity: 1; }
      100% { transform: scale(0.1) rotate(720deg); opacity: 0; }
    }
    /* GUIDE MODAL */
    #guide-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3cqi 4cqi;
      display: flex;
      flex-direction: column;
      gap: 2.2cqi;
    }
    .merge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2cqi 0;
      border-bottom: 1px solid #e0f0f8;
    }
    .inputs {
      display: flex;
      gap: 1.6cqi;
      flex-shrink: 0;
    }
    .arrow-container {
      flex: 1;
      display: flex;
      align-items: center;
      height: 10cqi;
      margin: 0 4cqi;
    }
    .arrow-line {
      flex: 1;
      height: 0.5cqi;
      background: #222;
      border-radius: 2px;
      position: relative;
    }
    .arrow-line::after {
      content: '';
      position: absolute;
      right: 1.1cqi;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 5.2cqi;
      height: 5.2cqi;
      border-top: 0.5cqi solid #222;
      border-right: 0.5cqi solid #222;
      border-bottom: none;
      border-left: none;
    }
    .result {
      flex-shrink: 0;
    }
    .guide-doodle {
      width: 8.7cqi;
      height: auto;
      cursor: pointer;
    }
    #full-guide-btn {
      background: #4dbde5;
      color: white;
      padding: 2cqi 8cqi;
      font-size: 5cqi;
      border-radius: 9999px;
      display: none;
    }
    #full-guide-btn:hover { transform: scale(1.05); }
    /* TOOLTIP */
    #tooltip {
      position: absolute;
      background: #ccecf8;
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 260px;
      font-family: 'Fira Sans', sans-serif;
      font-size: 4.2cqi;
      line-height: 1.5;
      z-index: 250;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
    }
    #tooltip.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }
    #tooltip .tooltip-desc {
      color: #222;
    }
    .inline-doodle {
      display: inline-block;
      width: 1.3em;
      height: auto;
      vertical-align: middle;
      margin: 0 0.15em -0.2em;
    }
    /* TOAST */
    #toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(251, 176, 101, 0.95);
      color: #000;
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
      padding: 2cqi 5cqi;
      border-radius: 9999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 300;
      white-space: nowrap;
      max-width: 80cqi;
      text-align: center;
    }
    #toast.show {
      opacity: 1;
    }

    /* ==================== SCORE MODAL - CAMERA & OVERLAY ONLY FIXED ==================== */
    #score-modal .scanner-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4cqi 3cqi;
      gap: 3cqi;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 30cqi;
    }

    #score-modal .camera-container {
      position: relative;
      width: 90cqi;
      max-width: 520px;
      aspect-ratio: 11 / 7;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
      border: 4px solid #333;
      margin: 0 auto;
    }

    #score-modal #score-camera-preview {
      width: 100%;
      height: 100%;
      object-fit: cover;
      background: #000;
    }

    #score-modal #score-grid-overlay {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 2;
    }

    #score-modal .scanner-content > * {
      width: 90cqi;
      max-width: 520px;
      margin: 0 auto;
    }

    #score-modal #score-output-canvas,
    #score-modal #score-detected-grid,
    #score-modal #score-tally,
    #score-modal #score-debug-cells,
    #score-modal #score-console-log,
    #score-modal #score-tweak-prompt {
      width: 90cqi;
      max-width: 520px;
      margin: 0 auto;
    }

    #score-modal .status { font-size: 4.5cqi; text-align: center; margin: 10px 0; color: #fff; }
    #score-modal .debug { font-size: 3.2cqi; color: #aaa; text-align: left; padding: 2cqi; background: rgba(255,255,255,0.05); border-radius: 8px; }
    #score-modal .console-log { width: 90cqi; max-width: 520px; background: #222; color: #0f0; padding: 12px; font-family: monospace; font-size: 3.2cqi; line-height: 1.5; border-radius: 8px; white-space: pre-wrap; max-height: 180px; overflow-y: auto; }
    #score-modal .tweak-prompt { display:none; text-align:center; font-size:4cqi; color:#ff0; background:rgba(0,0,0,0.6); padding:2cqi; border-radius:8px; width:90cqi; max-width:520px; }
    #score-modal #score-detected-grid { display:none; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(7,1fr); gap:3px; width:90cqi; max-width:520px; height:420px; background:#111; padding:8px; border-radius:12px; }
    #score-modal .grid-cell { position:relative; aspect-ratio:1; background:transparent; border:none; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; transition:transform .4s; }
    #score-modal .grid-cell:hover { transform:scale(1.12); }
    #score-modal .grid-cell.low-confidence { box-shadow:0 0 0 6px rgba(255,255,0,0.8); }
    #score-modal .grid-cell.scoring { transform:scale(1.25); }
    #score-modal .point-bubble { position:absolute; width:85px; height:85px; background-size:contain; background-repeat:no-repeat; background-position:center; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; color:#fff; text-shadow:0 2px 8px #000; pointer-events:none; z-index:30; transition:all .8s cubic-bezier(0.68,-0.55,0.27,1.55); }
    #score-modal #score-tally { display:none; width:90cqi; max-width:520px; background:#1a1a1a; padding:15px; border-radius:16px; margin-top:15px; max-height:45vh; overflow-y:auto; }
    #score-modal .tally-row { display:flex; align-items:center; background:#222; border-radius:12px; padding:10px 15px; margin-bottom:10px; }
    #score-modal .tally-row img { width:55px; height:55px; object-fit:contain; margin-right:15px; }
    #score-modal .tally-line { flex:1; height:3px; background:#555; margin:0 15px; border-radius:3px; }
    #score-modal .score-box { padding:8px 25px; background:#333; border-radius:9999px; font-size:5.2cqi; font-weight:bold; min-width:100px; text-align:center; }
    #score-modal button { background:#5fbae9; color:white; padding:4cqi 14cqi; font-size:6cqi; border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; }
    #score-modal #score-snap-btn { margin-top:auto; width:85%; max-width:520px; padding:5cqi 12cqi; font-size:7cqi; font-weight:bold; }
    #score-modal #score-final-total { font-size:10cqi; font-weight:bold; color:#ff0; margin:20px 0; text-align:center; }
    #score-modal #score-doodle-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:4cqi; border-radius:16px; z-index:200; box-shadow:0 0 30px rgba(255,255,255,0.3); }
    #score-modal .popup-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1.5cqi; max-width:90vw; max-height:80vh; overflow-y:auto; }
    #score-modal .popup-item { width:8cqi; height:8cqi; background:#f0f0f0; border:2px solid #ccc; border-radius:8px; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; }
    #score-modal .popup-item:hover { border-color:#ff0; }
  </style>
</head>
<body>
  <!-- (HTML body is exactly as you sent it - no changes) -->
  <div id="game-container">
    <div id="header">
      <button id="guide-btn">GUIDE</button>
      <button id="learn-btn">LEARN</button>
    </div>
   
    <div id="shuffle-zone">
      <div id="doodle-l1"></div>
      <div id="doodle-l2"></div>
      <div id="doodle-l3"></div>
      <div id="doodle-r1"></div>
      <div id="doodle-r2"></div>
      <div id="doodle-r3"></div>
      <button id="shuffle-btn">SHUFFLE</button>
    </div>
    <div id="footer">
      <button id="portfolio-btn">PORTFOLIO</button>
      <button id="score-btn">SCORE</button>
    </div>

    <!-- LEARN MODAL -->
    <div id="learn-modal" class="modal learn">
      <div class="modal-top learn">
        <div class="title">Learn a Doodle</div>
        <div class="buttons">
          <button class="action-btn learn" id="modal-learn-btn">LEARN</button>
          <button class="close-btn" id="close-learn">✕</button>
        </div>
      </div>
      <div id="learn-grid" class="modal-grid"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- PORTFOLIO MODAL -->
    <div id="portfolio-modal" class="modal portfolio">
      <div class="modal-top portfolio">
        <div class="title">Portfolio</div>
        <div class="buttons">
          <button class="action-btn remove" id="modal-remove-btn">REMOVE</button>
          <button class="close-btn" id="close-portfolio">✕</button>
        </div>
      </div>
      <div id="portfolio-grid" class="modal-grid"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- GUIDE MODAL -->
    <div id="guide-modal" class="modal guide">
      <div class="modal-top guide">
        <div class="title">Doodle Guide</div>
        <div class="buttons">
          <button id="full-guide-btn">FULL GUIDE</button>
          <button class="close-btn" id="close-guide">✕</button>
        </div>
      </div>
      <div id="guide-content"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- SCORE MODAL -->
    <div id="score-modal" class="modal score">
      <div class="modal-top score">
        <div class="title">Score My Sheet</div>
        <div class="buttons">
          <button class="close-btn" id="close-score">✕</button>
        </div>
      </div>
      <div id="score-content" class="scanner-content">
        <p>Align the two blue page grids with your notebook pages.<br>Fill the preview edge-to-edge then tap SNAP.</p>
       
        <div class="camera-container">
          <video id="score-camera-preview" autoplay playsinline muted></video>
          <canvas id="score-grid-overlay"></canvas>
        </div>
        <canvas id="score-output-canvas"></canvas>
        <div id="score-status" class="status">Waiting for photo...</div>
        <div class="debug" id="score-debug-info">8.0 • Clean scoring mode</div>
       
        <div id="score-debug-cells" class="debug-cells"></div>
        <div id="score-console-log" class="console-log">Waiting for photo...</div>
        <div id="score-tweak-prompt" class="tweak-prompt">Detected! Tap any wrong cell to correct (yellow = low confidence)</div>
        <div id="score-detected-grid"></div>
       
        <button id="score-score-btn" style="display:none;">SCORE SHEET</button>
        <button id="score-export-btn" style="display:none;">📤 EXPORT TRAINING ZIP</button>
        <button id="score-snap-btn" style="display:none;">SNAP NOW</button>
        <div id="score-tally"></div>
        <div id="score-final-total" style="display:none;"></div>
        <button id="score-new-scan-btn" style="display:none;">NEW SCAN</button>
      </div>
      <div id="score-doodle-popup">
        <div class="popup-grid" id="score-popup-grid"></div>
      </div>
    </div>

    <!-- TOOLTIP -->
    <div id="tooltip">
      <div class="tooltip-desc" id="tooltip-desc"></div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>
  </div>

  <script>
    let deck = {
      circle: 2,
      square: 2,
      triangle: 2,
      dot: 2,
      line: 2
    };
    const allPossibleDoodles = [
      "circle", "square", "triangle", "line", "dot",
      "lens", "halfcircle", "drop", "teeth", "cylinder",
      "cube", "pyramid", "cloud", "coin", "smiley",
      "letter", "house", "die", "piano", "pizza",
      "star", "wireless", "music", "planet", "sword",
      "fish", "umbrella", "boat", "butterfly", "heart",
      "turd", "flower", "crown", "cat", "rocket",
      "mug", "toiletpaper", "chest", "present", "diamond",
      "icecream"
    ];
    const doodleDescriptions = {
      circle: "{circle} is a basic shape that can merge to create many doodles (see Doodle Guide).",
      square: "{square} is a basic shape that can merge to create many doodles (see Doodle Guide).",
      triangle: "{triangle} is a basic shape that can merge to create many doodles (see Doodle Guide).",
      dot: "{dot} is a basic shape that can merge to create many doodles (see Doodle Guide).",
      line: "{line} is a basic shape that can merge to create many doodles (see Doodle Guide).",
      drop: "{drop} is an intermediate shape that can merge to create {heart}, {flower}, and {turd}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Contributes to scoring for {mug}, {umbrella}, and {cloud}.",
      teeth: "{teeth} is an intermediate shape that can merge to create {cat}, {rocket}, and {crown}.",
      lens: "{lens} is an intermediate shape that can merge to create {rocket}, {planet}, and {fish}.",
      halfcircle: "{halfcircle} is an intermediate shape that can merge to create {chest}, {butterfly}, and {umbrella}.",
      boat: "{boat} scores {2pt} per {fish} <i><b>below</b></i> on <i><b>same page</b></i>.",
      butterfly: "{butterfly} scores {1pt} per {flower} in largest <i><b>group</b></i>.",
      cat: "{cat} scores {3pt} (+{2pt} per <i><b>surrounding</b></i> {fish}/{turd})",
      chest: "{chest} scores {2pt} per <i><b>surrounding</b></i> {coin}/{diamond}/{crown}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Contributes to scoring for {chest}.",
      cloud: "{cloud} scores {1pt} per {drop} <i><b>below</b></i> on <i><b>same page</b></i>.",
      coin: "{coin} scores {2pt}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Contributes to scoring for {chest}.",
      crown: "{crown} scores {3pt} (+{4pt} if {smiley} is <i><b>directly-below</b></i>).<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Contributes to scoring for {chest}.",
      cube: "{cube} is an intermediate shape that can merge to create {chest} or {present}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Also score {10pt} per set of {cube}{cylinder}{pyramid}.",
      cylinder: "{cylinder} is an intermediate shape that can merge to create {mug} or {toiletpaper}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Also score {10pt} per set of {cube}{cylinder}{pyramid}.",
      diamond: "{diamond} scores {4pt}.<br><hr style='border:0; height:1px; background:#a0d0e8; margin:8px 0;'>Contributes to scoring for {chest}.",
      die: "{die} copies the value of a <i><b>surrounding</b></i> doodle.",

    function formatName(name) {
      return name.charAt(0).toUpperCase() + name.slice(1);

    function renderDescription(text) {
      return text.replace(/\{(\w+)\}/gi, (match, key) => {
        const lower = key.toLowerCase();
        if (allPossibleDoodles.includes(lower)) {
          return `<img src="images/${lower}.png" class="inline-doodle" alt="${formatName(lower)}">`;
        }
        if (/^\d+pt$/.test(lower) || lower === 'minus2pt') {
          const ptFile = lower === 'minus2pt' ? 'minus2pt' : lower;
          return `<img src="images/${ptFile}.png" class="inline-doodle" alt="${key}">`;
        }
        return key;
      });
    }

    // GUIDE RENDERING & FILTERING

    function renderGuide(filterDoodle = null) {
      currentGuideFilter = filterDoodle;
      const content = document.getElementById('guide-content');
      content.innerHTML = '';
      const filteredMerges = doodleMerges.filter(merge => {
        if (!filterDoodle) return true;
        const lower = filterDoodle.toLowerCase();
        return merge.inputs.some(i => i.toLowerCase() === lower) || merge.output.toLowerCase() === lower;
      });
      if (filteredMerges.length === 0 && filterDoodle) {
        const empty = document.createElement('div');
        empty.style.padding = '20cqi';
        empty.style.textAlign = 'center';
        empty.style.color = '#666';
        empty.style.fontSize = '5cqi';

      } else {
        filteredMerges.forEach(merge => {
          const row = document.createElement('div');
          row.className = 'merge-row';
          const inputsDiv = document.createElement('div');
          inputsDiv.className = 'inputs';

            inputsDiv.appendChild(img);

          row.appendChild(inputsDiv);
          const arrowContainer = document.createElement('div');

          row.appendChild(arrowContainer);
          const resultDiv = document.createElement('div');
          resultDiv.className = 'result';
          const resultImg = document.createElement('img');
          resultImg.src = `images/${merge.output}.png`;
          resultImg.className = 'guide-doodle';
          resultImg.addEventListener('click', () => renderGuide(merge.output));
          resultDiv.appendChild(resultImg);
          row.appendChild(resultDiv);

      document.getElementById('full-guide-btn').style.display = filterDoodle ? 'block' : 'none';

    function getDeckAsArray() {
      let arr = [];
      for (let [doodle, count] of Object.entries(deck)) {
        for (let i = 0; i < count; i++) arr.push(doodle);
      }
      return arr;
    }
    function shuffle(array) {
      for (let i = array.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [array[i], array[j]] = [array[j], array[i]];
      }
      return array;
    }
    function drawSix() {
      const deckArray = getDeckAsArray();
      if (deckArray.length < 6) {
        alert("You need at least 6 doodles in your deck to shuffle!");
        return null;
      }
      return shuffle([...deckArray]).slice(0, 6);
    }

    // SCORE SCANNER
    let scoreStream = null;
    let scoreVideo, scoreOutputCanvas, scoreStatusEl, scoreModel = null;
    let scoreClassNames = [], scoreDetectedDoodles = [], scoreConfidences = [], scoreCellCanvases = [];
    let scoreBoard = Array(7).fill().map(() => Array(11).fill(null));
    let scorePerCellScore = Array(7).fill().map(() => Array(11).fill(0));
    let scoreGridCells = [];
    const LOW_CONFIDENCE_THRESHOLD = 0.75;
    const playableCols = [0,1,2,3,4,6,7,8,9,10];

    function scoreLog(text) {
      document.getElementById('score-console-log').textContent += text + "\n";
    }
    async function scoreLoadModel() {
      scoreLog("Loading ML model...");
      try {
        scoreModel = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        scoreClassNames = meta.labels || meta.classNames || [];
        scoreLog(`Model loaded! ${scoreClassNames.length} classes`);
      } catch (e) {
        scoreLog("ERROR loading model: " + e.message);
      }
    }
    async function scoreStartCamera() {
      scoreStatusEl.textContent = "Requesting camera...";
      try {
        scoreStream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: "environment" } });
        scoreVideo.srcObject = scoreStream;
        scoreVideo.onloadeddata = () => {
          document.getElementById('score-snap-btn').style.display = 'block';
          scoreInitGridOverlay();
          scoreStatusEl.textContent = "Camera ready! Point at notebook and SNAP";
        };
      } catch (e) {
        scoreStatusEl.textContent = `Camera error: ${e.name}`;
      }
    }

    function scoreInitGridOverlay() {
      const overlay = document.getElementById('score-grid-overlay');
      if (!overlay) return;

      function redraw() {
        overlay.width = overlay.clientWidth;
        overlay.height = overlay.clientHeight;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        const rect = { left: 0, top: 0, w: overlay.width, h: overlay.height };
        drawOverlayGrid(ctx, rect.left, rect.top, rect.w, rect.h);
      }

      redraw();
      window.addEventListener('resize', redraw);
      scoreVideo.addEventListener('play', () => setTimeout(redraw, 100), { once: true });
    }

    function drawOverlayGrid(ctx, gx, gy, gw, gh) {
      const unitW = gw / 11;
      const unitH = gh / 7;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(95, 186, 233, 0.95)';
      ctx.lineWidth = Math.max(2.8, gw / 380);
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + 5 * unitW, y); ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = gx + Math.round(i * unitW);
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
      }
      const rightStart = gx + 6 * unitW;
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath(); ctx.moveTo(rightStart, y); ctx.lineTo(rightStart + 5 * unitW, y); ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = rightStart + Math.round(i * unitW);
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
      }
    }

    document.getElementById('score-snap-btn').onclick = async () => {
      scoreStatusEl.textContent = "Capturing...";
      const captured = document.createElement('canvas');
      captured.width = scoreVideo.videoWidth;
      captured.height = scoreVideo.videoHeight;
      captured.getContext('2d').drawImage(scoreVideo, 0, 0);
      const displayRect = {left:0, top:0, w: scoreVideo.clientWidth, h: scoreVideo.clientHeight};
      const sourceRect = getVideoSourceRect(displayRect);
      const cropped = document.createElement('canvas');
      cropped.width = sourceRect.w;
      cropped.height = sourceRect.h;
      cropped.getContext('2d').drawImage(captured, sourceRect.left, sourceRect.top, sourceRect.w, sourceRect.h, 0, 0, sourceRect.w, sourceRect.h);
      scoreOutputCanvas.width = sourceRect.w;
      scoreOutputCanvas.height = sourceRect.h;
      const outCtx = scoreOutputCanvas.getContext('2d');
      outCtx.drawImage(cropped, 0, 0);
      drawOverlayGrid(outCtx, 0, 0, sourceRect.w, sourceRect.h);
      await scoreDetectFromCropped(cropped);
    };

    function getCurrentGridRect(w, h) { return { left: 0, top: 0, w, h }; }
    function getVideoSourceRect(displayRect) {
      const vw = scoreVideo.videoWidth, vh = scoreVideo.videoHeight;
      const cw = scoreVideo.clientWidth, ch = scoreVideo.clientHeight;
      const videoAspect = vw / vh, containerAspect = cw / ch;
      let scale, offsetX = 0, offsetY = 0;
      if (videoAspect > containerAspect) {
        scale = ch / vh;
        offsetX = (vw * scale - cw) / 2;
      } else {
        scale = cw / vw;
        offsetY = (vh * scale - ch) / 2;
      }
      return {
        left: Math.round((displayRect.left + offsetX) / scale),
        top: Math.round((displayRect.top + offsetY) / scale),
        w: Math.round(displayRect.w / scale),
        h: Math.round(displayRect.h / scale)
      };
    }

    async function scoreDetectFromCropped(cropped) {
      const numCols = 11;
      const numRows = 7;
      const cellW = cropped.width / numCols;
      const cellH = cropped.height / numRows;
      scoreDetectedDoodles = [];
      scoreConfidences = [];
      scoreCellCanvases = [];
      scoreLog("Detecting...");
      for (let r = 0; r < numRows; r++) {
        for (let pc of playableCols) {
          const cellCanvas = document.createElement('canvas');
          cellCanvas.width = 224;
          cellCanvas.height = 224;
          const cellCtx = cellCanvas.getContext('2d');
          cellCtx.drawImage(cropped, Math.round(pc * cellW), Math.round(r * cellH), Math.round(cellW), Math.round(cellH), 0, 0, 224, 224);
          scoreCellCanvases.push(cellCanvas);
          const tensor = tf.browser.fromPixels(cellCanvas).expandDims(0).toFloat().div(255);
          const prediction = scoreModel.predict(tensor);
          const scores = await prediction.array();
          let scoresArray = scores[0].slice();
          let maxIndex = scoresArray.indexOf(Math.max(...scoresArray));
          let predicted = scoreClassNames[maxIndex];
          let confidence = scoresArray[maxIndex];
          if (predicted === 'unknown' && scoresArray.length > 1) {
            scoresArray[maxIndex] = -999;
            maxIndex = scoresArray.indexOf(Math.max(...scoresArray));
            predicted = scoreClassNames[maxIndex];
            confidence = scoresArray[maxIndex];
          }
          scoreDetectedDoodles.push(predicted);
          scoreConfidences.push(confidence);
        }
      }
      scoreBuildBoard();
      scoreRenderDetectedGrid();
      document.getElementById('score-score-btn').style.display = 'block';
      document.getElementById('score-export-btn').style.display = 'block';
      scoreStatusEl.textContent = "Ready to score!";
    }
    function scoreBuildBoard() {
      scoreBoard = Array(7).fill().map(() => Array(11).fill(null));
      let idx = 0;
      for (let r = 0; r < 7; r++) {
        for (let c of playableCols) {
          scoreBoard[r][c] = scoreDetectedDoodles[idx++];
        }
      }
    }
    function scoreRenderDetectedGrid() {
      const grid = document.getElementById('score-detected-grid');
      grid.innerHTML = '';
      grid.style.display = 'grid';
      scoreGridCells = [];
      scoreDetectedDoodles.forEach((d, i) => {
        const cell = document.createElement('div');
        cell.className = `grid-cell ${d}`;
        cell.dataset.index = i;
        cell.dataset.doodle = d;
        cell.style.backgroundImage = `url('images/${d}.png')`;
        if (scoreConfidences[i] < LOW_CONFIDENCE_THRESHOLD) cell.classList.add('low-confidence');
        cell.addEventListener('click', () => scoreShowDoodlePopup(i));
        grid.appendChild(cell);
        scoreGridCells.push(cell);
      });
    }
    let scoreCurrentCellIndex = -1;
    function scoreShowDoodlePopup(index) {
      scoreCurrentCellIndex = index;
      const popup = document.getElementById('score-doodle-popup');
      const grid = document.getElementById('score-popup-grid');
      grid.innerHTML = '';
      const opts = scoreClassNames.filter(name => name !== 'unknown');
      opts.forEach(d => {
        const item = document.createElement('div');
        item.className = 'popup-item';
        item.style.backgroundImage = `url('images/${d}.png')`;
        item.onclick = () => {
          const cell = document.querySelector(`#score-detected-grid .grid-cell[data-index="${index}"]`);
          cell.dataset.doodle = d;
          cell.className = `grid-cell ${d}`;
          cell.style.backgroundImage = `url('images/${d}.png')`;
          scoreDetectedDoodles[index] = d;
          cell.classList.remove('low-confidence');
          popup.style.display = 'none';
        };
        grid.appendChild(item);
      });
      popup.style.display = 'block';
    }
    async function scoreExportTrainingData() {
      const zip = new JSZip();
      scoreDetectedDoodles.forEach((doodle, i) => {
        const className = doodle.toLowerCase().replace(/[^a-z0-9]/g, '');
        const randomNum = Math.floor(Math.random() * 900000) + 100000;
        const filename = `${className}${randomNum}.png`;
        scoreCellCanvases[i].toBlob(blob => zip.file(filename, blob), 'image/png');
      });
      const content = await zip.generateAsync({type: "blob"});
      const url = URL.createObjectURL(content);
      const a = document.createElement('a');
      a.href = url;
      a.download = `doodle-training-${new Date().toISOString().slice(0,10)}.zip`;
      a.click();
      URL.revokeObjectURL(url);
    }
    document.getElementById('score-score-btn').onclick = () => {
      document.getElementById('score-tally').innerHTML = '<p>Scoring animation placeholder</p>';
      document.getElementById('score-tally').style.display = 'block';
      document.getElementById('score-new-scan-btn').style.display = 'block';
    };

    function initScoreScanner() {
      scoreVideo = document.getElementById('score-camera-preview');
      scoreOutputCanvas = document.getElementById('score-output-canvas');
      scoreStatusEl = document.getElementById('score-status');
      scoreVideo.addEventListener('play', () => scoreInitGridOverlay(), { once: true });
      scoreLoadModel().then(() => scoreStartCamera());
    }

    populateLearnGrid();
  </script>
</body>
</html>
