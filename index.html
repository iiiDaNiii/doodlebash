<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Notebook Scanner 6.3</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; }
    .container { height:100dvh; display:flex; flex-direction:column; }
    .header { background:#7f2a8f; padding:3cqi; text-align:center; font-size:6cqi; }
    .content { 
      flex:1; 
      display:flex; 
      flex-direction:column; 
      align-items:center; 
      padding:4cqi; 
      gap:3cqi; 
    }
    .camera-container {
      position:relative;
      width:90vw;
      max-width:520px;
      aspect-ratio: 11 / 7;   /* exact ratio for square cells when full-edge */
      border-radius: 0;       /* removed rounding so grid reaches edges */
      overflow:hidden;
      background:#111;
      border: 4px solid #333;
    }
    #camera-preview { width:100%; height:100%; object-fit:cover; }
    #grid-overlay {
      position:absolute;
      top:0; left:0;
      width:100%; height:100%;
      pointer-events:none;
      z-index:2;
    }
    #output-canvas { max-width:90vw; border:3px solid #333; border-radius:12px; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    .status { font-size:4.5cqi; text-align:center; margin:10px 0; }
    .debug { font-size:3.2cqi; color:#aaa; text-align:left; max-width:520px; padding:2cqi; background:rgba(255,255,255,0.05); border-radius:8px; }
    
    .debug-cells { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; width:90vw; max-width:520px; }
    .debug-cell { border:2px solid #666; border-radius:8px; overflow:hidden; aspect-ratio:1/1; }
    .debug-cell canvas { width:100%; height:100%; display:block; }
    
    .console-log {
      width:90vw; max-width:520px;
      background:#222; color:#0f0;
      padding:12px; font-family:monospace; font-size:3.2cqi;
      line-height:1.5; border-radius:8px;
      white-space:pre-wrap; max-height:180px; overflow-y:auto;
    }
    #tweak-prompt {
      display:none; text-align:center; font-size:4cqi; color:#ff0;
      background:rgba(0,0,0,0.6); padding:2cqi; border-radius:8px;
      width:90vw; max-width:520px;
    }
    #detected-grid {
      display:none; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(7,1fr);
      gap:3px; width:90vw; max-width:520px; height:420px;
      background:#111; padding:8px; border-radius:12px;
    }
    .grid-cell {
      aspect-ratio:1; background:#f0f0f0; border:3px solid #ccc;
      border-radius:8px; background-size:contain; background-position:center;
      background-repeat:no-repeat; cursor:pointer; transition:transform .2s;
    }
    .grid-cell:hover { transform:scale(1.12); }
    #export-btn { 
      background:#4dbde5; color:white; padding:3cqi 10cqi; font-size:5cqi; 
      border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; 
      display:none; 
    }
    
    /* SNAP button at bottom for thumb comfort */
    #snap-btn { 
      margin-top: auto; 
      width: 85%; 
      max-width: 520px; 
      padding: 4cqi 8cqi; 
      font-size: 6cqi; 
      font-weight: bold;
    }

    #doodle-popup {
      display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%);
      background:rgba(0,0,0,0.8); padding:4cqi; border-radius:16px; z-index:100;
      box-shadow:0 0 20px rgba(255,255,255,0.2);
    }
    .popup-grid {
      display:grid; grid-template-columns:repeat(7,1fr); gap:1.5cqi;
      max-width:90vw; max-height:80vh; overflow-y:auto;
    }
    .popup-item {
      width:8cqi; height:8cqi;
      background:#f0f0f0; border:2px solid #ccc; border-radius:8px;
      background-size:contain; background-position:center; background-repeat:no-repeat;
      cursor:pointer;
    }
    .popup-item:hover { border-color:#ff0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Doodle Notebook Scanner 6.3</div>
    <div class="content">
      <p>Align the two red page grids with your notebook pages.<br>Fill the preview edge-to-edge then tap SNAP.</p>
      
      <div class="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
        <canvas id="grid-overlay"></canvas>
      </div>

      <canvas id="output-canvas"></canvas>
      <div id="status" class="status">Align grids then SNAP</div>
      <div class="debug" id="debug-info">6.3 • Full-edge grid • Bold lines • Square cells</div>
      
      <div id="debug-cells" class="debug-cells"></div>
      <div id="console-log" class="console-log">Waiting for photo...</div>
      <div id="tweak-prompt">Detected! Tap any wrong cell to correct</div>
      <div id="detected-grid"></div>
      <button id="export-btn">📤 EXPORT TRAINING ZIP</button>

      <!-- SNAP button moved to bottom -->
      <button id="snap-btn" style="display:none;">SNAP NOW</button>
    </div>
  </div>

  <div id="doodle-popup">
    <div class="popup-grid" id="popup-grid"></div>
  </div>

  <script>
    console.log("=== DOODLE NOTEBOOK SCANNER 6.3 - FULL-EDGE + BOTTOM SNAP ===");

    // Shared state
    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let status = document.getElementById('status');

    // ML
    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let cellCanvases = [];

    function log(text) {
      const logEl = document.getElementById('console-log');
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function loadModel() {
      log("Loading ML model...");
      try {
        model = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        classNames = meta.labels || meta.classNames || [];
        log(`✅ Model loaded! ${classNames.length} classes`);
      } catch (e) {
        log("❌ ERROR loading model: " + e.message);
      }
    }

    function getCurrentGridRect(displayW, displayH) {
      // Full edge-to-edge (no inset)
      return { left: 0, top: 0, w: displayW, h: displayH };
    }

    function getVideoSourceRect(displayRect) {
      const vw = video.videoWidth;
      const vh = video.videoHeight;
      const cw = video.clientWidth;
      const ch = video.clientHeight;

      const videoAspect = vw / vh;
      const containerAspect = cw / ch;

      let scale, offsetX = 0, offsetY = 0;

      if (videoAspect > containerAspect) {
        scale = ch / vh;
        const displayedW = vw * scale;
        offsetX = (displayedW - cw) / 2;
      } else {
        scale = cw / vw;
        const displayedH = vh * scale;
        offsetY = (displayedH - ch) / 2;
      }

      return {
        left: Math.round((displayRect.left + offsetX) / scale),
        top: Math.round((displayRect.top + offsetY) / scale),
        w: Math.round(displayRect.w / scale),
        h: Math.round(displayRect.h / scale)
      };
    }

    function drawOverlayGrid(ctx, gx, gy, gw, gh) {
      const unitW = gw / 11;
      const unitH = gh / 7;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(255,50,50,0.95)';
      ctx.lineWidth = Math.max(5.5, gw / 220);   // bolder lines

      // Left page (5 columns)
      const leftW = 5 * unitW;
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath();
        ctx.moveTo(gx, y);
        ctx.lineTo(gx + leftW, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = gx + Math.round(i * unitW);
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x, gy + gh);
        ctx.stroke();
      }

      // Right page (5 columns)
      const rightStart = gx + 6 * unitW;
      const rightW = 5 * unitW;
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath();
        ctx.moveTo(rightStart, y);
        ctx.lineTo(rightStart + rightW, y);
        ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = rightStart + Math.round(i * unitW);
        ctx.beginPath();
        ctx.moveTo(x, gy);
        ctx.lineTo(x, gy + gh);
        ctx.stroke();
      }
    }

    function initGridOverlay() {
      const overlay = document.getElementById('grid-overlay');
      
      function redraw() {
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        
        const rect = getCurrentGridRect(overlay.width, overlay.height);
        drawOverlayGrid(ctx, rect.left, rect.top, rect.w, rect.h);
      }
      
      redraw();
      window.addEventListener('resize', redraw);
    }

    async function startCamera() {
      stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
      video.srcObject = stream;
      video.onloadeddata = () => {
        document.getElementById('snap-btn').style.display = 'block';
        initGridOverlay();
      };
    }

    document.getElementById('snap-btn').onclick = async () => {
      status.textContent = "Capturing exact live view...";

      const captured = document.createElement('canvas');
      captured.width = video.videoWidth;
      captured.height = video.videoHeight;
      captured.getContext('2d').drawImage(video, 0, 0);

      const displayRect = getCurrentGridRect(video.clientWidth, video.clientHeight);
      const sourceRect = getVideoSourceRect(displayRect);

      const cropped = document.createElement('canvas');
      cropped.width = sourceRect.w;
      cropped.height = sourceRect.h;
      cropped.getContext('2d').drawImage(
        captured,
        sourceRect.left, sourceRect.top, sourceRect.w, sourceRect.h,
        0, 0, sourceRect.w, sourceRect.h
      );

      outputCanvas.width = sourceRect.w;
      outputCanvas.height = sourceRect.h;
      const outCtx = outputCanvas.getContext('2d');
      outCtx.drawImage(cropped, 0, 0);
      drawOverlayGrid(outCtx, 0, 0, sourceRect.w, sourceRect.h);

      status.textContent = "Detecting 70 doodles...";
      await detectFromCropped(cropped);
    };

    async function detectFromCropped(cropped) {
      const numCols = 11;
      const numRows = 7;
      const cellW = cropped.width / numCols;
      const cellH = cropped.height / numRows;
      const playableCols = [0,1,2,3,4,6,7,8,9,10];

      detectedDoodles = [];
      cellCanvases = [];
      log("🚀 Detecting 70 doodles from full-edge grid...");

      for (let r = 0; r < numRows; r++) {
        for (let c of playableCols) {
          const cellCanvas = document.createElement('canvas');
          cellCanvas.width = 224;
          cellCanvas.height = 224;
          const cellCtx = cellCanvas.getContext('2d');

          cellCtx.drawImage(
            cropped,
            Math.round(c * cellW),
            Math.round(r * cellH),
            Math.round(cellW),
            Math.round(cellH),
            0, 0, 224, 224
          );

          cellCanvases.push(cellCanvas);

          const tensor = tf.browser.fromPixels(cellCanvas).expandDims(0).toFloat().div(255);
          const prediction = model.predict(tensor);
          const scores = await prediction.array();

          let maxIndex = scores[0].indexOf(Math.max(...scores[0]));
          let predicted = classNames[maxIndex];
          if (predicted === 'unknown' && scores[0].length > 1) {
            scores[0][maxIndex] = -999;
            maxIndex = scores[0].indexOf(Math.max(...scores[0]));
            predicted = classNames[maxIndex];
          }

          log(`Cell [${r},${c}] → ${predicted}`);
          detectedDoodles.push(predicted);
        }
      }

      renderDetectedGrid();
      renderDebugCells(cropped);
      document.getElementById('tweak-prompt').style.display = 'block';
      status.textContent = `✅ Scanned ${detectedDoodles.length} cells!`;
    }

    function renderDebugCells(cropped) {
      const container = document.getElementById('debug-cells');
      container.innerHTML = '';
      const playableCols = [0,1,2,3,4,6,7,8,9,10];
      const cellW = cropped.width / 11;
      const cellH = cropped.height / 7;

      for (let r = 0; r < 7; r++) {
        for (let c of playableCols) {
          const thumb = document.createElement('canvas');
          thumb.width = 80;
          thumb.height = 80;
          const tctx = thumb.getContext('2d');
          tctx.drawImage(cropped, Math.round(c * cellW), Math.round(r * cellH), Math.round(cellW), Math.round(cellH), 0, 0, 80, 80);
          const div = document.createElement('div');
          div.className = 'debug-cell';
          div.appendChild(thumb);
          container.appendChild(div);
        }
      }
    }

    // Unchanged UI functions below...
    let currentCellIndex = -1;
    function showDoodlePopup(index) {
      currentCellIndex = index;
      const popup = document.getElementById('doodle-popup');
      const grid = document.getElementById('popup-grid');
      grid.innerHTML = '';
      const opts = classNames.filter(name => name !== 'unknown');
      opts.forEach(d => {
        const item = document.createElement('div');
        item.className = 'popup-item';
        item.style.backgroundImage = `url('images/${d}.png')`;
        item.onclick = () => {
          const cell = document.querySelector(`.grid-cell[data-index="${index}"]`);
          cell.dataset.doodle = d;
          cell.className = `grid-cell ${d}`;
          cell.style.backgroundImage = `url('images/${d}.png')`;
          detectedDoodles[index] = d;
          popup.style.display = 'none';
        };
        grid.appendChild(item);
      });
      popup.style.display = 'block';
    }

    function renderDetectedGrid() {
      const grid = document.getElementById('detected-grid');
      grid.innerHTML = '';
      grid.style.display = 'grid';
      detectedDoodles.forEach((d, i) => {
        const cell = document.createElement('div');
        cell.className = `grid-cell ${d}`;
        cell.dataset.index = i;
        cell.dataset.doodle = d;
        cell.style.backgroundImage = `url('images/${d}.png')`;
        cell.addEventListener('click', () => showDoodlePopup(i));
        grid.appendChild(cell);
      });
      document.getElementById('export-btn').style.display = 'block';
    }

    async function exportTrainingData() {
      const zip = new JSZip();
      log("📦 Building training ZIP...");
      detectedDoodles.forEach((doodle, i) => {
        const className = doodle.toLowerCase().replace(/[^a-z0-9]/g, '');
        const randomNum = Math.floor(Math.random() * 900000) + 100000;
        const filename = `${className}${randomNum}.png`;
        cellCanvases[i].toBlob(blob => zip.file(filename, blob), 'image/png');
      });
      setTimeout(async () => {
        const content = await zip.generateAsync({type: "blob"});
        const url = URL.createObjectURL(content);
        const a = document.createElement('a');
        a.href = url;
        a.download = `doodle-training-${new Date().toISOString().slice(0,10)}.zip`;
        a.click();
        URL.revokeObjectURL(url);
        log(`✅ Exported ${detectedDoodles.length} images!`);
      }, 500);
    }

    document.getElementById('export-btn').onclick = exportTrainingData;

    window.onload = async () => {
      await loadModel();
      startCamera();
    };
  </script>
</body>
</html>
