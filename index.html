<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Notebook Scanner 8.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; overflow:hidden; }
    .container { height:100dvh; display:flex; flex-direction:column; }
    .header { background:#7f2a8f; padding:3cqi; text-align:center; font-size:6cqi; }
    .content { flex:1; display:flex; flex-direction:column; align-items:center; padding:4cqi; gap:3cqi; transition:all .6s; }
    .camera-container, #output-canvas, .debug, #console-log, #tweak-prompt, #snap-btn, #debug-cells { transition:all .6s; }
    .scoring-mode .camera-container,
    .scoring-mode #output-canvas,
    .scoring-mode .debug,
    .scoring-mode #console-log,
    .scoring-mode #tweak-prompt,
    .scoring-mode #snap-btn,
    .scoring-mode #debug-cells { opacity:0; height:0; margin:0; overflow:hidden; }

    .camera-container { position:relative; width:90vw; max-width:520px; aspect-ratio: 11 / 7; border-radius:0; overflow:hidden; background:#111; border:4px solid #333; }
    #camera-preview { width:100%; height:100%; object-fit:cover; }
    #grid-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2; }
    #detected-grid { display:none; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(7,1fr); gap:3px; width:90vw; max-width:520px; background:#111; padding:8px; border-radius:12px; }
    .grid-cell { position:relative; aspect-ratio:1; background:transparent; border:none; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; transition:transform .4s; }
    .grid-cell:hover { transform:scale(1.12); }
    .grid-cell.low-confidence { box-shadow:0 0 0 6px rgba(255,255,0,0.8); }
    .grid-cell.scoring { transform:scale(1.25); z-index:5; }
    .point-bubble { position:absolute; width:82px; height:82px; background-size:contain; background-repeat:no-repeat; background-position:center; display:flex; align-items:center; justify-content:center; font-size:28px; font-weight:bold; color:#fff; text-shadow:0 2px 6px #000; pointer-events:none; z-index:20; }
    #score-tally { display:none; width:90vw; max-width:520px; background:#1a1a1a; padding:15px; border-radius:16px; margin-top:15px; max-height:45vh; overflow-y:auto; }
    .tally-row { display:flex; align-items:center; background:#222; border-radius:12px; padding:10px 15px; margin-bottom:10px; }
    .tally-row img { width:55px; height:55px; object-fit:contain; margin-right:15px; }
    .tally-line { flex:1; height:3px; background:#555; margin:0 15px; border-radius:3px; }
    .score-box { padding:8px 22px; background:#333; border-radius:9999px; font-size:5.2cqi; font-weight:bold; min-width:90px; text-align:center; }
    #score-btn, #export-btn, #new-scan-btn { background:#5fbae9; color:white; padding:3.5cqi 12cqi; font-size:5.5cqi; border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; }
    #final-total { font-size:10cqi; font-weight:bold; color:#ff0; margin:20px 0; text-align:center; }
    #doodle-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:4cqi; border-radius:16px; z-index:100; box-shadow:0 0 30px rgba(255,255,255,0.3); }
    .popup-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1.5cqi; max-width:90vw; max-height:80vh; overflow-y:auto; }
    .popup-item { width:8cqi; height:8cqi; background:#f0f0f0; border:2px solid #ccc; border-radius:8px; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; }
    .popup-item:hover { border-color:#ff0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Doodle Notebook Scanner 8.0</div>
    <div class="content" id="main-content">
      <p>Align the two blue page grids with your notebook pages.<br>Fill the preview edge-to-edge then tap SNAP.</p>
      
      <div class="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
        <canvas id="grid-overlay"></canvas>
      </div>

      <canvas id="output-canvas"></canvas>
      <div id="status" class="status">Align grids then SNAP</div>
      <div class="debug" id="debug-info">8.0 • Clean scoring mode</div>
      
      <div id="debug-cells" class="debug-cells"></div>
      <div id="console-log" class="console-log">Waiting for photo...</div>
      <div id="tweak-prompt">Detected! Tap any wrong cell to correct (yellow = low confidence)</div>
      <div id="detected-grid"></div>
      
      <button id="score-btn" style="display:none;">SCORE SHEET</button>
      <button id="export-btn" style="display:none;">📤 EXPORT TRAINING ZIP</button>
      <button id="snap-btn" style="display:none;">SNAP NOW</button>

      <div id="score-tally"></div>
      <div id="final-total" style="display:none;"></div>
      <button id="new-scan-btn" style="display:none;">NEW SCAN</button>
    </div>
  </div>

  <div id="doodle-popup">
    <div class="popup-grid" id="popup-grid"></div>
  </div>

  <script>
    console.log("=== DOODLE NOTEBOOK SCANNER 8.0 ===");

    const LOW_CONFIDENCE_THRESHOLD = 0.75;
    const playableCols = [0,1,2,3,4,6,7,8,9,10];
    const simpleTypes = ['turd','music','planet','star','flower','coin','heart','pizza','diamond','icecream','sword','present'];

    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let statusEl = document.getElementById('status');
    let mainContent = document.getElementById('main-content');

    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let confidences = [];
    let cellCanvases = [];
    let board = Array(7).fill().map(() => Array(11).fill(null));
    let perCellScore = Array(7).fill().map(() => Array(11).fill(0));
    let gridCells = [];

    function log(text) { /* same as before */ }

    async function loadModel() { /* same as before */ }

    async function startCamera() { /* same as before */ }

    function getCurrentGridRect(w, h) { return {left:0, top:0, w, h}; }

    function getVideoSourceRect(displayRect) { /* same as before */ }

    function drawOverlayGrid(ctx, gx, gy, gw, gh) { /* same as before */ }

    function initGridOverlay() { /* same as before */ }

    document.getElementById('snap-btn').onclick = async () => { /* same capture + detectFromCropped as before */ };

    async function detectFromCropped(cropped) { /* same as before, calls buildBoard + renderDetectedGrid */ }

    function buildBoard() { /* same */ }

    function renderDetectedGrid() {
      const grid = document.getElementById('detected-grid');
      grid.innerHTML = '';
      grid.style.display = 'grid';
      gridCells = [];
      detectedDoodles.forEach((d, i) => {
        const cell = document.createElement('div');
        cell.className = `grid-cell ${d}`;
        cell.dataset.index = i;
        cell.dataset.doodle = d;
        cell.style.backgroundImage = `url('images/${d}.png')`;
        if (confidences[i] < LOW_CONFIDENCE_THRESHOLD) cell.classList.add('low-confidence');
        cell.addEventListener('click', () => showDoodlePopup(i));
        grid.appendChild(cell);
        gridCells.push(cell);
      });
      document.getElementById('score-btn').style.display = 'block';
    }

    let currentCellIndex = -1;
    function showDoodlePopup(index) { /* same as before */ }

    async function exportTrainingData() { /* same as before */ }

    // ====================== SCORING ======================
    const scoringRules = [ /* same full list as before */ ];

    function getSurrounding(r, c) { /* same */ }

    function calculateBase(type, pts) { /* same */ }

    function calculate3DSet() { /* same */ }

    // ... all other calculateXXX functions remain exactly the same as in the previous full version

    async function animateCell(cell, pts) {
      cell.classList.add('scoring');
      if (pts !== null && pts !== 0) {
        const bubble = document.createElement('div');
        bubble.className = 'point-bubble';
        bubble.style.backgroundImage = pts < 0 ? "url('images/blackpointbubble.png')" : "url('images/purplepointbubble.png')";
        bubble.textContent = pts > 0 ? `+${pts}` : pts;
        cell.appendChild(bubble);

        // Jump up + spin
        bubble.style.transition = 'none';
        bubble.style.top = '50%';
        bubble.style.left = '50%';
        bubble.style.transform = 'translate(-50%, -50%) scale(1) rotate(0deg)';
        bubble.offsetHeight;
        bubble.style.transition = 'transform 0.85s cubic-bezier(0.68, -0.55, 0.27, 1.55), top 0.85s, left 0.85s';
        bubble.style.transform = 'translate(-50%, -220%) scale(1.35) rotate(360deg)';
        bubble.style.top = '15%';

        // Settle to top-left corner small
        setTimeout(() => {
          bubble.style.transition = 'transform 0.6s ease-out, top 0.6s, left 0.6s';
          bubble.style.transform = 'translate(-50%, -50%) scale(0.32) rotate(360deg)';
          bubble.style.top = '12%';
          bubble.style.left = '12%';
        }, 900);
      }
      await new Promise(r => setTimeout(r, 650));
      cell.classList.remove('scoring');
    }

    function addTallyRow(type, subtotal) {
      const tally = document.getElementById('score-tally');
      const row = document.createElement('div');
      row.className = 'tally-row';

      const img = document.createElement('img');
      if (type === '3dset') {
        img.src = 'images/cube.png';
        img.style.opacity = '0.9';
      } else if (type === 'variety') {
        img.style.display = 'none';
      } else {
        img.src = `images/${type}.png`;
      }
      const line = document.createElement('div');
      line.className = 'tally-line';
      const scoreBox = document.createElement('div');
      scoreBox.className = 'score-box';
      scoreBox.textContent = subtotal >= 0 ? `+${subtotal}` : subtotal;
      scoreBox.style.color = subtotal >= 0 ? '#5fbae9' : '#ff6666';

      row.append(img, line, scoreBox);
      tally.appendChild(row);
    }

    async function runScoringAnimation() {
      buildBoard();
      perCellScore = Array(7).fill().map(() => Array(11).fill(0));

      mainContent.classList.add('scoring-mode');
      document.getElementById('score-tally').style.display = 'block';
      document.getElementById('score-tally').innerHTML = '';

      let total = 0;

      for (let rule of scoringRules) {
        let result = rule.base !== undefined ? calculateBase(rule.type, rule.base) : rule.calc();
        total += result.total || 0;

        const items = result.perCellList || result.positions || [];
        if (items.length > 0) {
          await Promise.all(items.map(item => {
            const flat = item.r * 10 + playableCols.indexOf(item.c);
            const cell = gridCells[flat];
            if (cell) return animateCell(cell, item.pts !== undefined ? item.pts : null);
            return Promise.resolve();
          }));
        }

        // Add tally row for this type
        const displayType = rule.type === '3dset' ? '3dset' : rule.type;
        addTallyRow(displayType, result.total || 0);

        await new Promise(r => setTimeout(r, 420));
      }

      // Variety bonus
      const unique = new Set(detectedDoodles).size;
      let bonus = unique <=12 ? -10 : unique<=14 ? 1 : unique===15 ? 5 : unique===16 ? 10 : unique===17 ? 16 : unique===18 ? 23 : unique===19 ? 31 : 40;
      total += bonus;
      addTallyRow('variety', bonus);

      // Final total row
      const totalRow = document.createElement('div');
      totalRow.style.fontSize = '7cqi';
      totalRow.style.fontWeight = 'bold';
      totalRow.style.color = '#ff0';
      totalRow.style.textAlign = 'center';
      totalRow.style.marginTop = '20px';
      totalRow.textContent = `TOTAL SCORE: ${total}`;
      document.getElementById('score-tally').appendChild(totalRow);

      document.getElementById('new-scan-btn').style.display = 'block';
      document.getElementById('export-btn').style.display = 'block';
    }

    document.getElementById('score-btn').onclick = runScoringAnimation;
    document.getElementById('new-scan-btn').onclick = () => location.reload();
    document.getElementById('export-btn').onclick = exportTrainingData;

    window.onload = async () => {
      await loadModel();
      startCamera();
    };
  </script>
</body>
</html>
