<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Notebook Scanner 8.0</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; }
    .container { height:100dvh; display:flex; flex-direction:column; }
    .header { background:#7f2a8f; padding:3cqi; text-align:center; font-size:6cqi; }
    .content { flex:1; display:flex; flex-direction:column; align-items:center; padding:4cqi; gap:3cqi; transition:all .6s; }
    .scoring-mode .camera-container,
    .scoring-mode #output-canvas,
    .scoring-mode .debug,
    .scoring-mode #console-log,
    .scoring-mode #tweak-prompt,
    .scoring-mode #snap-btn,
    .scoring-mode #debug-cells { display:none !important; }
    .camera-container { position:relative; width:90vw; max-width:520px; aspect-ratio: 11 / 7; border-radius:0; overflow:hidden; background:#111; border:4px solid #333; }
    #camera-preview { width:100%; height:100%; object-fit:cover; }
    #grid-overlay { position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:2; }
    #output-canvas { max-width:90vw; border:3px solid #333; border-radius:12px; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    .status { font-size:4.5cqi; text-align:center; margin:10px 0; }
    .debug { font-size:3.2cqi; color:#aaa; text-align:left; max-width:520px; padding:2cqi; background:rgba(255,255,255,0.05); border-radius:8px; }
    .debug-cells { display:grid; grid-template-columns:repeat(10,1fr); gap:4px; width:90vw; max-width:520px; }
    .debug-cell { border:2px solid #666; border-radius:8px; overflow:hidden; aspect-ratio:1/1; }
    .debug-cell canvas { width:100%; height:100%; display:block; }
    .console-log { width:90vw; max-width:520px; background:#222; color:#0f0; padding:12px; font-family:monospace; font-size:3.2cqi; line-height:1.5; border-radius:8px; white-space:pre-wrap; max-height:180px; overflow-y:auto; }
    #tweak-prompt { display:none; text-align:center; font-size:4cqi; color:#ff0; background:rgba(0,0,0,0.6); padding:2cqi; border-radius:8px; width:90vw; max-width:520px; }
    #detected-grid { display:none; grid-template-columns:repeat(10,1fr); grid-template-rows:repeat(7,1fr); gap:3px; width:90vw; max-width:520px; height:420px; background:#111; padding:8px; border-radius:12px; }
    .grid-cell { position:relative; aspect-ratio:1; background:transparent; border:none; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; transition:transform .4s; }
    .grid-cell:hover { transform:scale(1.12); }
    .grid-cell.low-confidence { box-shadow:0 0 0 6px rgba(255,255,0,0.8); }
    .grid-cell.scoring { transform:scale(1.25); }
    .point-bubble { position:absolute; width:85px; height:85px; background-size:contain; background-repeat:no-repeat; background-position:center; display:flex; align-items:center; justify-content:center; font-size:30px; font-weight:bold; color:#fff; text-shadow:0 2px 8px #000; pointer-events:none; z-index:30; transition:all .8s cubic-bezier(0.68, -0.55, 0.27, 1.55); }
    #score-tally { display:none; width:90vw; max-width:520px; background:#1a1a1a; padding:15px; border-radius:16px; margin-top:15px; max-height:45vh; overflow-y:auto; }
    .tally-row { display:flex; align-items:center; background:#222; border-radius:12px; padding:10px 15px; margin-bottom:10px; }
    .tally-row img { width:55px; height:55px; object-fit:contain; margin-right:15px; }
    .tally-line { flex:1; height:3px; background:#555; margin:0 15px; border-radius:3px; }
    .score-box { padding:8px 25px; background:#333; border-radius:9999px; font-size:5.2cqi; font-weight:bold; min-width:100px; text-align:center; }
    #score-btn, #export-btn, #new-scan-btn { background:#5fbae9; color:white; padding:3.5cqi 12cqi; font-size:5.5cqi; border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; }
    #final-total { font-size:10cqi; font-weight:bold; color:#ff0; margin:20px 0; text-align:center; }
    #doodle-popup { display:none; position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); background:rgba(0,0,0,0.9); padding:4cqi; border-radius:16px; z-index:100; box-shadow:0 0 30px rgba(255,255,255,0.3); }
    .popup-grid { display:grid; grid-template-columns:repeat(7,1fr); gap:1.5cqi; max-width:90vw; max-height:80vh; overflow-y:auto; }
    .popup-item { width:8cqi; height:8cqi; background:#f0f0f0; border:2px solid #ccc; border-radius:8px; background-size:contain; background-position:center; background-repeat:no-repeat; cursor:pointer; }
    .popup-item:hover { border-color:#ff0; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Doodle Notebook Scanner 8.0</div>
    <div class="content">
      <p>Align the two blue page grids with your notebook pages.<br>Fill the preview edge-to-edge then tap SNAP.</p>
      
      <div class="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
        <canvas id="grid-overlay"></canvas>
      </div>

      <canvas id="output-canvas"></canvas>
      <div id="status" class="status">Waiting for photo...</div>
      <div class="debug" id="debug-info">8.0 • Clean scoring mode</div>
      
      <div id="debug-cells" class="debug-cells"></div>
      <div id="console-log" class="console-log">Waiting for photo...</div>
      <div id="tweak-prompt">Detected! Tap any wrong cell to correct (yellow = low confidence)</div>
      <div id="detected-grid"></div>
      
      <button id="score-btn" style="display:none;">SCORE SHEET</button>
      <button id="export-btn" style="display:none;">📤 EXPORT TRAINING ZIP</button>
      <button id="snap-btn" style="display:none;">SNAP NOW</button>

      <div id="score-tally"></div>
      <div id="final-total" style="display:none;"></div>
      <button id="new-scan-btn" style="display:none;">NEW SCAN</button>
    </div>
  </div>

  <div id="doodle-popup">
    <div class="popup-grid" id="popup-grid"></div>
  </div>

  <script>
    console.log("=== DOODLE NOTEBOOK SCANNER 8.0 FULL ===");

    const LOW_CONFIDENCE_THRESHOLD = 0.75;
    const playableCols = [0,1,2,3,4,6,7,8,9,10];

    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let statusEl = document.getElementById('status');

    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let confidences = [];
    let cellCanvases = [];
    let board = Array(7).fill().map(() => Array(11).fill(null));
    let perCellScore = Array(7).fill().map(() => Array(11).fill(0));
    let gridCells = [];

    function log(text) {
      const logEl = document.getElementById('console-log');
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    async function loadModel() {
      log("Loading ML model...");
      try {
        model = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        classNames = meta.labels || meta.classNames || [];
        log(`✅ Model loaded! ${classNames.length} classes`);
      } catch (e) {
        log("❌ ERROR loading model: " + e.message);
      }
    }

    async function startCamera() {
      statusEl.textContent = "Requesting camera permission...";
      console.log("startCamera called");
      try {
        console.log("Calling getUserMedia...");
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        console.log("getUserMedia succeeded");
        video.srcObject = stream;
        statusEl.textContent = "Camera stream attached – waiting for video data...";
        video.onloadeddata = () => {
          console.log("onloadeddata fired – camera ready");
          document.getElementById('snap-btn').style.display = 'block';
          initGridOverlay();
          statusEl.textContent = "Camera ready! Point at notebook and SNAP";
        };
      } catch (e) {
        console.error("getUserMedia failed:", e.name, e.message);
        statusEl.textContent = `Camera error: ${e.name} – ${e.message || 'Check console'}. Make sure you're on localhost or https.`;
      }
    }

    function getCurrentGridRect(w, h) { return {left:0, top:0, w, h}; }

    function getVideoSourceRect(displayRect) {
      const vw = video.videoWidth, vh = video.videoHeight;
      const cw = video.clientWidth, ch = video.clientHeight;
      const videoAspect = vw / vh, containerAspect = cw / ch;
      let scale, offsetX = 0, offsetY = 0;
      if (videoAspect > containerAspect) {
        scale = ch / vh;
        offsetX = (vw * scale - cw) / 2;
      } else {
        scale = cw / vw;
        offsetY = (vh * scale - ch) / 2;
      }
      return {
        left: Math.round((displayRect.left + offsetX) / scale),
        top: Math.round((displayRect.top + offsetY) / scale),
        w: Math.round(displayRect.w / scale),
        h: Math.round(displayRect.h / scale)
      };
    }

    function drawOverlayGrid(ctx, gx, gy, gw, gh) {
      const unitW = gw / 11;
      const unitH = gh / 7;
      ctx.lineCap = 'round';
      ctx.strokeStyle = 'rgba(95, 186, 233, 0.95)';
      ctx.lineWidth = Math.max(2.8, gw / 380);

      const leftW = 5 * unitW;
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath(); ctx.moveTo(gx, y); ctx.lineTo(gx + leftW, y); ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = gx + Math.round(i * unitW);
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
      }
      const rightStart = gx + 6 * unitW;
      const rightW = 5 * unitW;
      for (let i = 0; i <= 7; i++) {
        const y = gy + Math.round(i * unitH);
        ctx.beginPath(); ctx.moveTo(rightStart, y); ctx.lineTo(rightStart + rightW, y); ctx.stroke();
      }
      for (let i = 0; i <= 5; i++) {
        const x = rightStart + Math.round(i * unitW);
        ctx.beginPath(); ctx.moveTo(x, gy); ctx.lineTo(x, gy + gh); ctx.stroke();
      }
    }

    function initGridOverlay() {
      const overlay = document.getElementById('grid-overlay');
      function redraw() {
        overlay.width = video.clientWidth;
        overlay.height = video.clientHeight;
        const ctx = overlay.getContext('2d');
        ctx.clearRect(0, 0, overlay.width, overlay.height);
        const rect = getCurrentGridRect(overlay.width, overlay.height);
        drawOverlayGrid(ctx, rect.left, rect.top, rect.w, rect.h);
      }
      redraw();
      window.addEventListener('resize', redraw);
    }

    document.getElementById('snap-btn').onclick = async () => {
      statusEl.textContent = "Capturing...";
      const captured = document.createElement('canvas');
      captured.width = video.videoWidth;
      captured.height = video.videoHeight;
      captured.getContext('2d').drawImage(video, 0, 0);

      const displayRect = getCurrentGridRect(video.clientWidth, video.clientHeight);
      const sourceRect = getVideoSourceRect(displayRect);

      const cropped = document.createElement('canvas');
      cropped.width = sourceRect.w;
      cropped.height = sourceRect.h;
      cropped.getContext('2d').drawImage(captured, sourceRect.left, sourceRect.top, sourceRect.w, sourceRect.h, 0, 0, sourceRect.w, sourceRect.h);

      outputCanvas.width = sourceRect.w;
      outputCanvas.height = sourceRect.h;
      const outCtx = outputCanvas.getContext('2d');
      outCtx.drawImage(cropped, 0, 0);
      drawOverlayGrid(outCtx, 0, 0, sourceRect.w, sourceRect.h);

      await detectFromCropped(cropped);
    };

    async function detectFromCropped(cropped) {
      const numCols = 11;
      const numRows = 7;
      const cellW = cropped.width / numCols;
      const cellH = cropped.height / numRows;

      detectedDoodles = [];
      confidences = [];
      cellCanvases = [];
      log("🚀 Detecting 70 doodles...");

      for (let r = 0; r < numRows; r++) {
        for (let pc of playableCols) {
          const cellCanvas = document.createElement('
