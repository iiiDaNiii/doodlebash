<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Notebook Scanner 5.13</title>
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <!-- Pure JS ArUco2 (no WASM, no build issues) -->
  <script src="https://cdn.jsdelivr.net/npm/js-aruco2@1.0.0/dist/js-aruco2.min.js"></script>
  <style>
    body { margin:0; background:#000; color:white; font-family:system-ui; }
    .container { height:100dvh; display:flex; flex-direction:column; }
    .header { background:#7f2a8f; padding:3cqi; text-align:center; font-size:6cqi; }
    .content { flex:1; display:flex; flex-direction:column; align-items:center; padding:4cqi; gap:3cqi; }
    .camera-container {
      position:relative;
      width:90vw;
      max-width:520px;
      aspect-ratio: 3 / 2;
      border-radius:16px;
      overflow:hidden;
    }
    #camera-preview { width:100%; height:100%; object-fit:cover; }
    #output-canvas { max-width:90vw; border:3px solid #333; border-radius:12px; background:#fff; box-shadow:0 4px 20px rgba(0,0,0,0.5); }
    .status { font-size:4.5cqi; text-align:center; margin:10px 0; }
    .debug { font-size:3.2cqi; color:#aaa; text-align:left; max-width:520px; padding:2cqi; background:rgba(255,255,255,0.05); border-radius:8px; }
    .console-log {
      width: 90vw;
      max-width: 520px;
      background: #222;
      color: #0f0;
      padding: 12px;
      font-family: monospace;
      font-size: 3.2cqi;
      line-height: 1.5;
      border-radius: 8px;
      white-space: pre-wrap;
      max-height: 180px;
      overflow-y: auto;
    }
    #tweak-prompt { display:none; text-align:center; font-size:4cqi; color:#ff0; background:rgba(0,0,0,0.6); padding:2cqi; border-radius:8px; width:90vw; max-width:520px; }
    #detected-grid {
      display: none;
      grid-template-columns: repeat(10, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 3px;
      width: 90vw;
      max-width: 520px;
      height: 420px;
      background: #111;
      padding: 8px;
      border-radius: 12px;
    }
    .grid-cell {
      aspect-ratio: 1;
      background: #f0f0f0;
      border: 3px solid #ccc;
      border-radius: 8px;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      cursor: pointer;
    }
    #export-btn { background:#4dbde5; color:white; padding:3cqi 10cqi; font-size:5cqi; border:none; border-radius:9999px; margin-top:2cqi; cursor:pointer; display:none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">Doodle Notebook Scanner 5.13</div>
    <div class="content">
      <p>Point camera at your notebook (markers in frame!)</p>
      <div class="camera-container">
        <video id="camera-preview" autoplay playsinline muted></video>
      </div>
      <button id="snap-btn" style="display:none; padding:3cqi 8cqi; font-size:5.5cqi;">SNAP NOW</button>
      <canvas id="output-canvas"></canvas>
      <div id="status" class="status">Waiting for photo...</div>
      <div class="debug" id="debug-info">Grid debug will appear here after scan...</div>
      <div id="console-log" class="console-log">Waiting for photo...</div>
      <div id="tweak-prompt">Detected! Tap any wrong cell to select</div>
      <div id="detected-grid"></div>
      <button id="export-btn">📤 EXPORT TRAINING ZIP</button>
    </div>
  </div>

  <script>
    console.log("=== DOODLE NOTEBOOK SCANNER 5.13 LOADED ===");

    let stream = null;
    let video = document.getElementById('camera-preview');
    let outputCanvas = document.getElementById('output-canvas');
    let status = document.getElementById('status');
    let debugInfo = document.getElementById('debug-info');

    let model = null;
    let classNames = [];
    let detectedDoodles = [];
    let cellCanvases = [];

    function log(text) {
      const logEl = document.getElementById('console-log');
      logEl.textContent += text + "\n";
      logEl.scrollTop = logEl.scrollHeight;
    }

    // === ML Model ===
    async function loadModel() {
      log("Loading ML model...");
      try {
        model = await tf.loadLayersModel('models/doodle/model.json');
        const metadata = await fetch('models/doodle/metadata.json');
        const meta = await metadata.json();
        classNames = meta.labels || meta.classNames || [];
        log(`✅ Model loaded! ${classNames.length} classes`);
      } catch (e) {
        log("❌ ERROR loading model: " + e.message);
      }
    }

    // === Camera ===
    async function startCamera() {
      log("Starting camera...");
      try {
        stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
        video.srcObject = stream;
        video.onloadeddata = () => {
          document.getElementById('snap-btn').style.display = 'block';
          log("✅ Camera preview loaded!");
        };
      } catch (e) {
        log("❌ Camera access error: " + e.message);
      }
    }

    document.getElementById('snap-btn').onclick = () => {
      status.textContent = "Capturing photo...";
      const ctx = outputCanvas.getContext('2d');
      outputCanvas.width = video.videoWidth;
      outputCanvas.height = video.videoHeight;
      ctx.drawImage(video, 0, 0);

      status.textContent = "Processing with markers... (2-4 seconds)";
      setTimeout(() => processWhiteOutline(outputCanvas), 100);
    };

    // === Pure JS ArUco2 Detection + OpenCV Warping ===
    async function processWhiteOutline(canvas) {
      try {
        log("🚀 Starting pure JS ArUco2 detection...");

        // Pure JS ArUco2 detection
        const detector = new AR.Detector();
        const imageData = canvas.getContext('2d').getImageData(0, 0, canvas.width, canvas.height);
        const markers = detector.detect(imageData);

        let markerMap = {};
        for (let m of markers) {
          if (m.id >= 0 && m.id <= 3) {
            markerMap[m.id] = m.corners; // [0]=TL, [1]=TR, [2]=BR, [3]=BL
          }
        }

        let bestVertices = null;
        if (markerMap[0] && markerMap[1] && markerMap[2] && markerMap[3]) {
          bestVertices = [
            {x: markerMap[0][0].x, y: markerMap[0][0].y}, // TL
            {x: markerMap[1][1].x, y: markerMap[1][1].y}, // TR
            {x: markerMap[2][2].x, y: markerMap[2][2].y}, // BR
            {x: markerMap[3][3].x, y: markerMap[3][3].y}  // BL
          ];
          log("✅ Found 4 markers with pure JS ArUco2!");
        } else {
          log(`❌ Found ${markers.length} markers — need 4`);
          status.textContent = "Markers not detected - try again with all corners visible.";
          return;
        }

        // Rest of your warping code stays exactly the same (uses your custom OpenCV)
        let pts = bestVertices.map(p => [p.x, p.y]);
        let ordered = orderPoints(pts);

        // ... (your existing inset, dstWidth, dstHeight, perspective transform, resize, etc.)
        // (I kept the rest of your code unchanged from here down)

        let insetFactor = 0.015;
        let cx = (ordered[0][0] + ordered[1][0] + ordered[2][0] + ordered[3][0]) / 4;
        let cy = (ordered[0][1] + ordered[1][1] + ordered[2][1] + ordered[3][1]) / 4;
        for (let i = 0; i < 4; i++) {
          let dx = cx - ordered[i][0];
          let dy = cy - ordered[i][1];
          ordered[i][0] += dx * insetFactor;
          ordered[i][1] += dy * insetFactor;
        }

        let paperRatio = 9.75 / 6.5;
        let dstWidth = Math.max(400, Math.round(Math.max(
          Math.hypot(ordered[1][0] - ordered[0][0], ordered[1][1] - ordered[0][1]),
          Math.hypot(ordered[2][0] - ordered[3][0], ordered[2][1] - ordered[3][1])
        )));
        let dstHeight = Math.round(dstWidth / paperRatio);

        let srcPoints = new cv.Mat(4, 1, cv.CV_32FC2);
        let dstPoints = new cv.Mat(4, 1, cv.CV_32FC2);
        srcPoints.data32F.set([ordered[0][0], ordered[0][1], ordered[1][0], ordered[1][1],
                               ordered[2][0], ordered[2][1], ordered[3][0], ordered[3][1]]);
        dstPoints.data32F.set([0, 0, dstWidth, 0, dstWidth, dstHeight, 0, dstHeight]);

        let M = cv.getPerspectiveTransform(srcPoints, dstPoints);

        let warped = new cv.Mat();
        cv.warpPerspective(cv.imread(canvas), warped, M, new cv.Size(dstWidth, dstHeight), cv.INTER_LINEAR, cv.BORDER_CONSTANT, new cv.Scalar(255,255,255,255));

        let targetWidth = 800;
        let targetHeight = Math.round(targetWidth * (dstHeight / dstWidth));
        let resized = new cv.Mat();
        cv.resize(warped, resized, new cv.Size(targetWidth, targetHeight), 0, 0, cv.INTER_CUBIC);

        outputCanvas.width = targetWidth;
        outputCanvas.height = targetHeight;
        cv.imshow('output-canvas', resized);

        // Your existing fiddle zone + grid + detection + debug (unchanged)
        const gridHeightPercent = 0.89;
        const gridVerticalOffsetPercent = -0.01;
        const lineColor = 'rgba(255, 50, 50, 0.92)';
        const lineWidth = 1.8;

        const ctx = outputCanvas.getContext('2d');
        ctx.strokeStyle = lineColor;
        ctx.lineWidth = lineWidth;
        ctx.lineCap = 'round';

        const numRows = 7;
        const numCols = 11;
        let gridHeight = targetHeight * gridHeightPercent;
        let cellSize = gridHeight / numRows;
        let gridWidth = cellSize * numCols;

        let offsetX = (targetWidth - gridWidth) / 2;
        let offsetY = (targetHeight - gridHeight) / 2 + (targetHeight * gridVerticalOffsetPercent);
        offsetY = Math.max(0, Math.min(offsetY, targetHeight - gridHeight));

        if (model) {
          detectedDoodles = await detectDoodlesFromWarped(outputCanvas, offsetX, offsetY, cellSize);
          renderDetectedGrid();
          renderDebugCells(outputCanvas, offsetX, offsetY, cellSize);
          document.getElementById('tweak-prompt').style.display = 'block';
        }

        // Draw grid
        for (let i = 0; i <= numRows; i++) {
          let y = Math.round(offsetY + i * cellSize);
          ctx.beginPath();
          ctx.moveTo(Math.round(offsetX), y);
          ctx.lineTo(Math.round(offsetX + gridWidth), y);
          ctx.stroke();
        }
        for (let j = 0; j <= numCols; j++) {
          let x = Math.round(offsetX + j * cellSize);
          ctx.beginPath();
          ctx.moveTo(x, Math.round(offsetY));
          ctx.lineTo(x, Math.round(offsetY + gridHeight));
          ctx.stroke();
        }

        debugInfo.innerHTML = `<strong>GRID DEBUG 5.13</strong><br>✅ Markers detected with pure JS ArUco2!`;

        // Cleanup
        srcPoints.delete(); dstPoints.delete(); M.delete();
        warped.delete(); resized.delete();

      } catch (e) {
        log('❌ Processing error: ' + (e.message || e));
        status.textContent = `Error: ${e.message || e}`;
      }
    }

    // Your existing orderPoints, detectDoodlesFromWarped, render functions, etc. stay exactly the same
    // (I omitted them here for brevity — keep them from your previous file)

    window.onload = async () => {
      log("Loading page...");
      await loadModel();
      startCamera();
    };
  </script>
</body>
</html>
