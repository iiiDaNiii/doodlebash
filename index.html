<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Bash</title>
  <link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #game-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 56.25dvh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr 3fr 1fr;
      overflow: hidden;
      container-type: inline-size;
    }

    @media (max-aspect-ratio: 9/16) {
      #game-container {
        width: 100vw;
        height: calc(100vw * 16 / 9);
      }
    }

    #header, #footer {
      container-type: inline-size;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      gap: 4cqi;
    }

    #shuffle-zone {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 1fr);
      height: 100%;
      width: 100%;
      container-type: inline-size;
      overflow: hidden;
    }

    #doodle-l1 { grid-column:1; grid-row:2; }
    #doodle-l2 { grid-column:1; grid-row:3; }
    #doodle-l3 { grid-column:1; grid-row:4; }
    #doodle-r1 { grid-column:3; grid-row:2; }
    #doodle-r2 { grid-column:3; grid-row:3; }
    #doodle-r3 { grid-column:3; grid-row:4; }

    #doodle-l1, #doodle-l2, #doodle-l3,
    #doodle-r1, #doodle-r2, #doodle-r3 {
      background-size: auto 75%;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 20;
      transition: transform 0.35s ease-out;
      transform: translateY(100dvh) rotate(0deg);
      cursor: pointer;
    }

    button {
      border: none;
      font-family: 'Covered By Your Grace', cursive;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover { transform: scale(1.05); }

    #header button, #footer button {
      font-size: 6.5cqi;
      padding: 3cqi 9cqi;
      border-radius: 9999px;
    }

    #header button { background: #7f2a8f; color: white; }
    #footer button { background: #fbb065; color: #000; }
    #footer #score-btn { background: #5fbae9; color: #000; }

    #shuffle-btn {
      grid-column: 2;
      grid-row: 3;
      background: #4dbde5;
      color: white;
      font-size: 6.5cqi;
      width: 100%;
      border-radius: 9999px;
    }

    /* MODALS */
    .modal {
      position: absolute;
      inset: 0;
      background: #fff;
      display: none;
      flex-direction: column;
      z-index: 100;
      container-type: inline-size;
      transform: translateY(0);
      transition: transform 0.4s ease-out;
    }

    .modal.learn { transform: translateY(-100%); }
    .modal.portfolio { transform: translateY(100%); }
    .modal.guide { transform: translateX(-100%); }
    .modal.score { background: #0a0a0a; }

    .modal.active {
      display: flex;
      transform: translate(0);
    }

    .modal-top {
      flex: 0 0 18%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4cqi;
      color: white;
    }

    .modal-top.learn { background: #7f2a8f; }
    .modal-top.portfolio { background: #fbb065; color: #000; }
    .modal-top.guide { background: #4dbde5; }
    .modal-top.score { background: #5fbae9; color: #000; }

    .modal-top .title {
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
    }

    .modal-top .buttons {
      display: flex;
      align-items: center;
      gap: 10.5cqi;
    }

    .close-btn,
    .action-btn {
      height: 9cqi;
      line-height: 9cqi;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7cqi;
    }

    .close-btn {
      width: 9cqi;
      border-radius: 2cqi;
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .modal-top.portfolio .close-btn,
    .modal-top.guide .close-btn,
    .modal-top.score .close-btn {
      background: rgba(0,0,0,0.15);
      color: #000;
    }

    .action-btn {
      padding: 0 6cqi;
      font-size: 6cqi;
      min-width: 14cqi;
      border-radius: 9999px;
      display: none;
    }

    .action-btn.learn { background: #fbb065; color: #000000; }
    .action-btn.remove { background: #7f2a8f; color: white; }

    .modal-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 1.4cqi;
      padding: 1.8cqi;
      overflow: hidden;
    }

    .modal-bottom-spacer {
      flex: 0 0 2.25%;
      background: transparent;
    }

    .doodle-cell {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1cqi;
      border-radius: 18px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .doodle-cell:hover:not(.selected) {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .doodle-cell.selected {
      transform: scale(1.5);
      z-index: 10;
      opacity: 1 !important;
    }

    .modal-grid .doodle-cell:not(.selected) {
      opacity: 0.5;
    }

    .modal-grid:not(:has(.selected)) .doodle-cell {
      opacity: 1;
    }

    .doodle-img {
      width: 92%;
      aspect-ratio: 1 / 1;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 14px;
      transition: all 0.6s ease-out;
    }

    .doodle-cell.animate-learn .doodle-img {
      animation: learnSpinShrink 0.6s ease-in-out forwards;
    }

    @keyframes learnSpinShrink {
      0%   { transform: scale(1) rotate(0deg); }
      40%  { transform: scale(0.1) rotate(720deg); }
      100% { transform: scale(1) rotate(720deg); }
    }

    .doodle-cell.animate-remove {
      animation: removeSlideDown 0.6s ease-in-out forwards;
    }

    @keyframes removeSlideDown {
      0%   { transform: translateY(0); }
      100% { transform: translateY(200%); }
    }

    .doodle-cell.animate-remove .doodle-img {
      animation: spinFadeScale 0.6s ease-in-out forwards;
    }

    @keyframes spinFadeScale {
      0%   { transform: scale(1) rotate(0deg); opacity: 1; }
      100% { transform: scale(0.1) rotate(720deg); opacity: 0; }
    }

    /* GUIDE MODAL */
    #guide-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3cqi 4cqi;
      display: flex;
      flex-direction: column;
      gap: 2.2cqi;
    }

    .merge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2cqi 0;
      border-bottom: 1px solid #e0f0f8;
    }

    .inputs {
      display: flex;
      gap: 1.6cqi;
      flex-shrink: 0;
    }

    .arrow-container {
      flex: 1;
      display: flex;
      align-items: center;
      height: 10cqi;
      margin: 0 4cqi;
    }

    .arrow-line {
      flex: 1;
      height: 0.5cqi;
      background: #222;
      border-radius: 2px;
      position: relative;
    }

    .arrow-line::after {
      content: '';
      position: absolute;
      right: 1.1cqi;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 5.2cqi;
      height: 5.2cqi;
      border-top: 0.5cqi solid #222;
      border-right: 0.5cqi solid #222;
      border-bottom: none;
      border-left: none;
    }

    .result {
      flex-shrink: 0;
    }

    .guide-doodle {
      width: 8.7cqi;
      height: auto;
      cursor: pointer;
    }

    #full-guide-btn {
      background: #4dbde5;
      color: white;
      padding: 2cqi 8cqi;
      font-size: 5cqi;
      border-radius: 9999px;
      display: none;
    }

    #full-guide-btn:hover { transform: scale(1.05); }

    /* TOOLTIP */
    #tooltip {
      position: absolute;
      background: #ccecf8;
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 260px;
      font-family: 'Fira Sans', sans-serif;
      font-size: 4.2cqi;
      line-height: 1.5;
      z-index: 250;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
    }

    #tooltip.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    #tooltip .tooltip-desc {
      color: #222;
    }

    .inline-doodle {
      display: inline-block;
      width: 1.3em;
      height: auto;
      vertical-align: middle;
      margin: 0 0.15em -0.2em;
    }

    /* TOAST */
    #toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(251, 176, 101, 0.95);
      color: #000;
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
      padding: 2cqi 5cqi;
      border-radius: 9999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 300;
      white-space: nowrap;
      max-width: 80cqi;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
    }

    /* SCORE MODAL STYLES (with fixes) */
    #score-modal .scanner-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4cqi;
      gap: 3cqi;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 25cqi;
    }

    #score-modal .camera-container {
      position: relative;
      width: 90cqi;
      max-width: 520px;
      aspect-ratio: 11 / 7;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
      border: 4px solid #333;
      margin: 0 auto;
    }

    #score-modal #score-camera-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #score-modal .scanner-content > * {
      width: 90cqi;
      max-width: 520px;
      margin: 0 auto;
    }
  </style>
</head>
<body>

  <div id="game-container">
    <div id="header">
      <button id="guide-btn">GUIDE</button>
      <button id="learn-btn">LEARN</button>
    </div>
    
    <div id="shuffle-zone">
      <div id="doodle-l1"></div>
      <div id="doodle-l2"></div>
      <div id="doodle-l3"></div>
      <div id="doodle-r1"></div>
      <div id="doodle-r2"></div>
      <div id="doodle-r3"></div>
      <button id="shuffle-btn">SHUFFLE</button>
    </div>

    <div id="footer">
      <button id="portfolio-btn">PORTFOLIO</button>
      <button id="score-btn">SCORE</button>
    </div>

    <!-- LEARN MODAL -->
    <div id="learn-modal" class="modal learn">
      <div class="modal-top learn">
        <div class="title">Learn a Doodle</div>
        <div class="buttons">
          <button class="action-btn learn" id="modal-learn-btn">LEARN</button>
          <button class="close-btn" id="close-learn">✕</button>
        </div>
      </div>
      <div id="learn-grid" class="modal-grid"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- PORTFOLIO MODAL -->
    <div id="portfolio-modal" class="modal portfolio">
      <div class="modal-top portfolio">
        <div class="title">Portfolio</div>
        <div class="buttons">
          <button class="action-btn remove" id="modal-remove-btn">REMOVE</button>
          <button class="close-btn" id="close-portfolio">✕</button>
        </div>
      </div>
      <div id="portfolio-grid" class="modal-grid"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- GUIDE MODAL -->
    <div id="guide-modal" class="modal guide">
      <div class="modal-top guide">
        <div class="title">Doodle Guide</div>
        <div class="buttons">
          <button id="full-guide-btn">FULL GUIDE</button>
          <button class="close-btn" id="close-guide">✕</button>
        </div>
      </div>
      <div id="guide-content"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- SCORE MODAL (placeholder - add your full scanner HTML here if needed) -->
    <div id="score-modal" class="modal score">
      <div class="modal-top score">
        <div class="title">Score My Sheet</div>
        <div class="buttons">
          <button class="close-btn" id="close-score">✕</button>
        </div>
      </div>
      <div id="score-content" class="scanner-content">
        <p>Score modal content goes here (camera, snap, etc.)</p>
        <!-- Add your full score scanner markup if you want it back -->
      </div>
    </div>

    <!-- TOOLTIP -->
    <div id="tooltip">
      <div class="tooltip-desc" id="tooltip-desc"></div>
    </div>

    <!-- TOAST -->
    <div id="toast"></div>
  </div>

  <script>
    // ────────────────────────────────────────────────
    // DECK & DATA
    // ────────────────────────────────────────────────
    let deck = { 
      circle: 2, square: 2, triangle: 2, dot: 2, line: 2
    };

    const allPossibleDoodles = [
      "circle", "square", "triangle", "line", "dot",
      "lens", "halfcircle", "drop", "teeth", "cylinder",
      "cube", "pyramid", "cloud", "coin", "smiley",
      "letter", "house", "die", "piano", "pizza",
      "star", "wireless", "music", "planet", "sword",
      "fish", "umbrella", "boat", "butterfly", "heart",
      "turd", "flower", "crown", "cat", "rocket",
      "mug", "toiletpaper", "chest", "present", "diamond",
      "icecream"
    ];

    const doodleMerges = [
      { inputs: ["circle", "square"], output: "cylinder" },
      { inputs: ["circle", "circle"], output: "lens" },
      { inputs: ["circle", "line"], output: "halfcircle" },
      { inputs: ["circle", "circle", "line"], output: "cloud" },
      { inputs: ["circle", "line", "line"], output: "coin" },
      { inputs: ["circle", "line", "dot", "dot"], output: "smiley" },
      { inputs: ["square", "square"], output: "cube" },
      { inputs: ["square", "line"], output: "letter" },
      { inputs: ["square", "triangle", "dot"], output: "house" },
      { inputs: ["square", "dot", "dot"], output: "die" },
      { inputs: ["square", "square", "line", "line"], output: "piano" },
      { inputs: ["triangle", "square"], output: "pyramid" },
      { inputs: ["triangle", "circle"], output: "drop" },
      { inputs: ["triangle", "triangle"], output: "teeth" },
      { inputs: ["triangle", "line", "dot", "dot"], output: "pizza" },
      { inputs: ["line", "line", "line"], output: "star" },
      { inputs: ["dot", "line", "line"], output: "wireless" },
      { inputs: ["dot", "dot", "line"], output: "music" },
      { inputs: ["lens", "circle"], output: "planet" },
      { inputs: ["lens", "dot", "line"], output: "sword" },
      { inputs: ["lens", "triangle", "dot"], output: "fish" },
      { inputs: ["halfcircle", "line"], output: "umbrella" },
      { inputs: ["halfcircle", "line", "triangle"], output: "boat" },
      { inputs: ["halfcircle", "halfcircle", "line"], output: "butterfly" },
      { inputs: ["drop", "drop"], output: "heart" },
      { inputs: ["drop", "circle"], output: "turd" },
      { inputs: ["drop", "drop", "dot"], output: "flower" },
      { inputs: ["teeth", "triangle", "dot"], output: "crown" },
      { inputs: ["teeth", "smiley", "line"], output: "cat" },
      { inputs: ["teeth", "lens", "dot", "line"], output: "rocket" },
      { inputs: ["cylinder", "line"], output: "mug" },
      { inputs: ["cylinder", "square", "dot"], output: "toiletpaper" },
      { inputs: ["cube", "halfcircle", "dot"], output: "chest" },
      { inputs: ["cube", "line", "heart"], output: "present" },
      { inputs: ["pyramid", "line", "line"], output: "diamond" },
      { inputs: ["pyramid", "line", "cloud"], output: "icecream" }
    ];

    // ────────────────────────────────────────────────
    // HELPERS
    // ────────────────────────────────────────────────
    function formatName(name) {
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    function openModal(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) {
        console.error(`Modal not found: ${modalId}`);
        return;
      }
      modal.style.display = 'flex';
      modal.offsetHeight; // force reflow
      modal.classList.add('active');
    }

    function closeModal(modalId) {
      const modal = document.getElementById(modalId);
      if (!modal) return;
      modal.classList.remove('active');
      setTimeout(() => {
        modal.style.display = 'none';
      }, 400);
    }

    // ────────────────────────────────────────────────
    // GUIDE (interactive filtering)
    // ────────────────────────────────────────────────
    let currentGuideFilter = null;

    function renderGuide(filterDoodle = null) {
      currentGuideFilter = filterDoodle;
      const content = document.getElementById('guide-content');
      content.innerHTML = '';

      const filtered = doodleMerges.filter(m => {
        if (!filterDoodle) return true;
        const f = filterDoodle.toLowerCase();
        return m.inputs.some(i => i.toLowerCase() === f) || m.output.toLowerCase() === f;
      });

      if (filtered.length === 0 && filterDoodle) {
        const msg = document.createElement('div');
        msg.style.padding = '20cqi';
        msg.style.textAlign = 'center';
        msg.style.color = '#666';
        msg.textContent = `No recipes found involving "${filterDoodle}"`;
        content.appendChild(msg);
      } else {
        filtered.forEach(merge => {
          const row = document.createElement('div');
          row.className = 'merge-row';

          const inputsDiv = document.createElement('div');
          inputsDiv.className = 'inputs';
          merge.inputs.forEach(d => inputsDiv.appendChild(makeGuideDoodle(d)));
          row.appendChild(inputsDiv);

          const arrow = document.createElement('div');
          arrow.className = 'arrow-container';
          arrow.innerHTML = '<div class="arrow-line"></div>';
          row.appendChild(arrow);

          const resultDiv = document.createElement('div');
          resultDiv.className = 'result';
          resultDiv.appendChild(makeGuideDoodle(merge.output));
          row.appendChild(resultDiv);

          content.appendChild(row);
        });
      }

      document.getElementById('full-guide-btn').style.display = filterDoodle ? 'inline-block' : 'none';
    }

    function makeGuideDoodle(name) {
      const img = document.createElement('img');
      img.src = `images/${name}.png`;
      img.className = 'guide-doodle';
      img.alt = name;
      img.title = name; // basic tooltip
      img.addEventListener('click', () => renderGuide(name));
      return img;
    }

    // ────────────────────────────────────────────────
    // EVENT LISTENERS
    // ────────────────────────────────────────────────
    document.getElementById('guide-btn').addEventListener('click', () => {
      renderGuide(); // full list
      openModal('guide-modal');
    });

    document.getElementById('full-guide-btn').addEventListener('click', () => {
      renderGuide(null);
    });

    document.getElementById('close-guide').addEventListener('click', () => closeModal('guide-modal'));

    document.getElementById('learn-btn').addEventListener('click', () => {
      // placeholder - add your populateLearnGrid() call here if needed
      openModal('learn-modal');
    });
    document.getElementById('close-learn').addEventListener('click', () => closeModal('learn-modal'));

    document.getElementById('portfolio-btn').addEventListener('click', () => {
      // placeholder - add your populatePortfolioGrid() call here
      openModal('portfolio-modal');
    });
    document.getElementById('close-portfolio').addEventListener('click', () => closeModal('portfolio-modal'));

    document.getElementById('score-btn').addEventListener('click', () => {
      openModal('score-modal');
      // initScoreScanner();  ← uncomment when you add the scanner back
    });
    document.getElementById('close-score').addEventListener('click', () => closeModal('score-modal'));

    // Shuffle button (placeholder)
    document.getElementById('shuffle-btn').addEventListener('click', () => {
      alert("Shuffle clicked! (implement drawSix here)");
    });

    // Start with full guide on first open (optional)
    // renderGuide();
  </script>
</body>
</html>
