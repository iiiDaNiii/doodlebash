<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Doodle Bash</title>
  <link href="https://fonts.googleapis.com/css2?family=Covered+By+Your+Grace&family=Fira+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    #game-container {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      width: 56.25dvh;
      height: 100dvh;
      display: grid;
      grid-template-rows: 1fr 3fr 1fr;
      overflow: hidden;
      container-type: inline-size;
    }

    @media (max-aspect-ratio: 9/16) {
      #game-container {
        width: 100vw;
        height: calc(100vw * 16 / 9);
      }
    }

    #header, #footer {
      container-type: inline-size;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #f5f5f5;
      gap: 4cqi;
    }

    #shuffle-zone {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      grid-template-rows: repeat(5, 1fr);
      height: 100%;
      width: 100%;
      container-type: inline-size;
      overflow: hidden;
    }

    #doodle-l1 { grid-column:1; grid-row:2; }
    #doodle-l2 { grid-column:1; grid-row:3; }
    #doodle-l3 { grid-column:1; grid-row:4; }
    #doodle-r1 { grid-column:3; grid-row:2; }
    #doodle-r2 { grid-column:3; grid-row:3; }
    #doodle-r3 { grid-column:3; grid-row:4; }

    #doodle-l1, #doodle-l2, #doodle-l3,
    #doodle-r1, #doodle-r2, #doodle-r3 {
      background-size: auto 75%;
      background-position: center;
      background-repeat: no-repeat;
      z-index: 20;
      transition: transform 0.35s ease-out;
      transform: translateY(100dvh) rotate(0deg);
      cursor: pointer;
    }

    button {
      border: none;
      font-family: 'Covered By Your Grace', cursive;
      font-weight: 400;
      cursor: pointer;
      transition: transform 0.2s;
    }

    button:hover { transform: scale(1.05); }

    #header button, #footer button {
      font-size: 6.5cqi;
      padding: 3cqi 9cqi;
      border-radius: 9999px;
    }

    #header button { background: #7f2a8f; color: white; }
    #footer button { background: #fbb065; color: #000; }
    #footer #score-btn { background: #5fbae9; color: #000; }

    #shuffle-btn {
      grid-column: 2;
      grid-row: 3;
      background: #4dbde5;
      color: white;
      font-size: 6.5cqi;
      width: 100%;
      border-radius: 9999px;
    }

    /* MODALS */
    .modal {
      position: absolute;
      inset: 0;
      background: #fff;
      display: none;
      flex-direction: column;
      z-index: 100;
      container-type: inline-size;
      transform: translateY(0);
      transition: transform 0.4s ease-out;
    }

    .modal.learn { transform: translateY(-100%); }
    .modal.portfolio { transform: translateY(100%); }
    .modal.guide { transform: translateX(-100%); }
    .modal.score { background: #0a0a0a; }

    .modal.active {
      display: flex;
      transform: translate(0);
    }

    .modal-top {
      flex: 0 0 18%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 4cqi;
      color: white;
    }

    .modal-top.learn { background: #7f2a8f; }
    .modal-top.portfolio { background: #fbb065; color: #000; }
    .modal-top.guide { background: #4dbde5; }
    .modal-top.score { background: #5fbae9; color: #000; }

    .modal-top .title {
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
    }

    .modal-top .buttons {
      display: flex;
      align-items: center;
      gap: 10.5cqi;
    }

    .close-btn,
    .action-btn {
      height: 9cqi;
      line-height: 9cqi;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 7cqi;
    }

    .close-btn {
      width: 9cqi;
      border-radius: 2cqi;
      background: rgba(255,255,255,0.25);
      color: white;
    }

    .modal-top.portfolio .close-btn,
    .modal-top.guide .close-btn,
    .modal-top.score .close-btn {
      background: rgba(0,0,0,0.15);
      color: #000;
    }

    .action-btn {
      padding: 0 6cqi;
      font-size: 6cqi;
      min-width: 14cqi;
      border-radius: 9999px;
      display: none;
    }

    .action-btn.learn { background: #fbb065; color: #000000; }
    .action-btn.remove { background: #7f2a8f; color: white; }

    .modal-grid {
      flex: 1;
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: repeat(7, 1fr);
      gap: 1.4cqi;
      padding: 1.8cqi;
      overflow: hidden;
    }

    .modal-bottom-spacer {
      flex: 0 0 2.25%;
      background: transparent;
    }

    .doodle-cell {
      min-height: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1cqi;
      border-radius: 18px;
      transition: all 0.3s ease;
      cursor: pointer;
      position: relative;
    }

    .doodle-cell:hover:not(.selected) {
      background: rgba(255,255,255,0.4);
      transform: scale(1.1);
    }

    .doodle-cell.selected {
      transform: scale(1.5);
      z-index: 10;
      opacity: 1 !important;
    }

    .modal-grid .doodle-cell:not(.selected) {
      opacity: 0.5;
    }

    .modal-grid:not(:has(.selected)) .doodle-cell {
      opacity: 1;
    }

    .doodle-img {
      width: 92%;
      aspect-ratio: 1 / 1;
      background-size: contain;
      background-position: center;
      background-repeat: no-repeat;
      border-radius: 14px;
      transition: all 0.6s ease-out;
    }

    .doodle-cell.animate-learn .doodle-img {
      animation: learnSpinShrink 0.6s ease-in-out forwards;
    }

    @keyframes learnSpinShrink {
      0%   { transform: scale(1) rotate(0deg); }
      40%  { transform: scale(0.1) rotate(720deg); }
      100% { transform: scale(1) rotate(720deg); }
    }

    .doodle-cell.animate-remove {
      animation: removeSlideDown 0.6s ease-in-out forwards;
    }

    @keyframes removeSlideDown {
      0%   { transform: translateY(0); }
      100% { transform: translateY(200%); }
    }

    .doodle-cell.animate-remove .doodle-img {
      animation: spinFadeScale 0.6s ease-in-out forwards;
    }

    @keyframes spinFadeScale {
      0%   { transform: scale(1) rotate(0deg); opacity: 1; }
      100% { transform: scale(0.1) rotate(720deg); opacity: 0; }
    }

    /* GUIDE MODAL */
    #guide-content {
      flex: 1;
      overflow-y: auto;
      overflow-x: hidden;
      padding: 3cqi 4cqi;
      display: flex;
      flex-direction: column;
      gap: 2.2cqi;
    }

    .merge-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 2.2cqi 0;
      border-bottom: 1px solid #e0f0f8;
    }

    .inputs {
      display: flex;
      gap: 1.6cqi;
      flex-shrink: 0;
    }

    .arrow-container {
      flex: 1;
      display: flex;
      align-items: center;
      height: 10cqi;
      margin: 0 4cqi;
    }

    .arrow-line {
      flex: 1;
      height: 0.5cqi;
      background: #222;
      border-radius: 2px;
      position: relative;
    }

    .arrow-line::after {
      content: '';
      position: absolute;
      right: 1.1cqi;
      top: 50%;
      transform: translateY(-50%) rotate(45deg);
      width: 5.2cqi;
      height: 5.2cqi;
      border-top: 0.5cqi solid #222;
      border-right: 0.5cqi solid #222;
      border-bottom: none;
      border-left: none;
    }

    .result {
      flex-shrink: 0;
    }

    .guide-doodle {
      width: 8.7cqi;
      height: auto;
    }

    #full-guide-btn {
      background: #4dbde5;
      color: white;
      padding: 2cqi 8cqi;
      font-size: 5cqi;
      border-radius: 9999px;
      display: none;
      cursor: pointer;
    }

    #full-guide-btn:hover { transform: scale(1.05); }

    /* TOOLTIP */
    #tooltip {
      position: absolute;
      background: #ccecf8;
      border-radius: 12px;
      padding: 16px 20px;
      max-width: 260px;
      font-family: 'Fira Sans', sans-serif;
      font-size: 4.2cqi;
      line-height: 1.5;
      z-index: 250;
      opacity: 0;
      visibility: hidden;
      transform: translateY(8px);
      transition: all 0.25s cubic-bezier(0.23, 1, 0.32, 1);
      pointer-events: none;
    }

    #tooltip.show {
      opacity: 1;
      visibility: visible;
      transform: translateY(0);
    }

    #tooltip .tooltip-desc {
      color: #222;
    }

    .inline-doodle {
      display: inline-block;
      width: 1.3em;
      height: auto;
      vertical-align: middle;
      margin: 0 0.15em -0.2em;
      background: none;
      box-shadow: none;
      border: none;
      padding: 0;
    }

    /* TOAST */
    #toast {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(251, 176, 101, 0.95);
      color: #000;
      font-family: 'Fira Sans', sans-serif;
      font-weight: 600;
      font-size: 5cqi;
      padding: 2cqi 5cqi;
      border-radius: 9999px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s ease;
      z-index: 300;
      white-space: nowrap;
      max-width: 80cqi;
      text-align: center;
    }

    #toast.show {
      opacity: 1;
    }

    /* SCORE MODAL CAMERA FIX + CENTERING/SCROLL FIX */
    #score-modal .camera-container {
      position: relative;
      width: 90cqi;
      max-width: 520px;
      aspect-ratio: 11 / 7;
      border-radius: 18px;
      overflow: hidden;
      background: #111;
      border: 4px solid #333;
      margin: 0 auto;
    }

    #score-modal #score-camera-preview {
      width: 100%;
      height: 100%;
      object-fit: contain;
      background: #000;
    }

    #score-modal .scanner-content {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 4cqi;
      gap: 3cqi;
      overflow-y: auto;
      overflow-x: hidden;
      padding-bottom: 25cqi;
    }

    #score-modal .scanner-content > * {
      width: 90cqi;
      max-width: 520px;
      margin-left: auto;
      margin-right: auto;
    }

    #score-modal #score-output-canvas,
    #score-modal #score-detected-grid,
    #score-modal #score-tally,
    #score-modal #score-debug-cells,
    #score-modal #score-console-log,
    #score-modal #score-tweak-prompt {
      width: 90cqi;
      max-width: 520px;
      margin: 0 auto;
    }

    /* (rest of your original score styles remain the same) */
  </style>
</head>
<body>

  <div id="game-container">
    <!-- header, shuffle-zone, footer (with SCORE button) remain exactly as before -->
    <div id="header">
      <button id="guide-btn">GUIDE</button>
      <button id="learn-btn">LEARN</button>
    </div>
    
    <div id="shuffle-zone">
      <!-- doodles and shuffle button -->
    </div>

    <div id="footer">
      <button id="portfolio-btn">PORTFOLIO</button>
      <button id="score-btn">SCORE</button>
    </div>

    <!-- all your existing modals (Learn, Portfolio) remain unchanged -->

    <!-- GUIDE MODAL - now interactive -->
    <div id="guide-modal" class="modal guide">
      <div class="modal-top guide">
        <div class="title">Doodle Guide</div>
        <div class="buttons">
          <button id="full-guide-btn">FULL GUIDE</button>
          <button class="close-btn" id="close-guide">✕</button>
        </div>
      </div>
      <div id="guide-content"></div>
      <div class="modal-bottom-spacer"></div>
    </div>

    <!-- SCORE MODAL - with all previous fixes -->
    <div id="score-modal" class="modal score">
      <!-- full score modal content from before -->
    </div>

    <!-- tooltip and toast -->
  </div>

  <script>
    /* all your original JS remains exactly the same until the guide section */

    let currentGuideFilter = null;

    function renderGuide(filterDoodle = null) {
      currentGuideFilter = filterDoodle;
      const content = document.getElementById('guide-content');
      content.innerHTML = '';

      const filteredMerges = doodleMerges.filter(merge => {
        if (!filterDoodle) return true;
        const lowerFilter = filterDoodle.toLowerCase();
        return merge.inputs.includes(lowerFilter) || merge.output.toLowerCase() === lowerFilter;
      });

      if (filteredMerges.length === 0) {
        const empty = document.createElement('div');
        empty.style.padding = '20cqi';
        empty.style.textAlign = 'center';
        empty.style.color = '#666';
        empty.style.fontSize = '5cqi';
        empty.textContent = 'No recipes found for this doodle.';
        content.appendChild(empty);
        return;
      }

      filteredMerges.forEach(merge => {
        const row = document.createElement('div');
        row.className = 'merge-row';

        const inputsDiv = document.createElement('div');
        inputsDiv.className = 'inputs';
        merge.inputs.forEach(d => {
          const img = createClickableDoodle(d);
          inputsDiv.appendChild(img);
        });
        row.appendChild(inputsDiv);

        const arrowContainer = document.createElement('div');
        arrowContainer.className = 'arrow-container';
        arrowContainer.innerHTML = `<div class="arrow-line"></div>`;
        row.appendChild(arrowContainer);

        const resultDiv = document.createElement('div');
        resultDiv.className = 'result';
        const resultImg = createClickableDoodle(merge.output);
        resultDiv.appendChild(resultImg);
        row.appendChild(resultDiv);

        content.appendChild(row);
      });

      document.getElementById('full-guide-btn').style.display = filterDoodle ? 'block' : 'none';
    }

    function createClickableDoodle(doodleName) {
      const img = document.createElement('img');
      img.src = `images/${doodleName}.png`;
      img.className = 'guide-doodle';
      img.style.cursor = 'pointer';

      img.addEventListener('click', () => renderGuide(doodleName));

      // keep your rich tooltip system
      setTimeout(() => addHoverListeners(img), 10);

      return img;
    }

    // updated guide open
    document.getElementById('guide-btn').addEventListener('click', () => {
      renderGuide(); // start with full list
      openModal('guide-modal');
    });

    // full guide button
    document.getElementById('full-guide-btn').addEventListener('click', () => {
      renderGuide(null);
    });

    /* all the rest of your original script (shuffle, score scanner, etc.) remains exactly as in the previous full file */

    populateLearnGrid();
    attachMainDoodleTooltips();
  </script>
</body>
</html>
